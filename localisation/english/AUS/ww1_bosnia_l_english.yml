#Events
ww1_bosnia.1.d: "An assassination attempt almost came to fruition in the vicinity of the Diet. Right after our governor-general, Marijan Varešanin, opened the Diet and went back in his carriage to his residence, the famous 'Konak', at a bridge crossing, Bogdan Žerajić fired five bullets in the direction of the governor-general. Varešanin, in shock, exited the vehicle bewildered, only to see the dead body of his assassin. Žerajić committed suicide with the last bullet. This vagueness spared us great turmoil throughout the region. He might have acted alone, but it is more likely he had some sort of support. Further investigation is necessary and immediate!"
ww1_bosnia.1.a: "These Serbs should get a hold of themselves!"

ww1_bosnia.2.t: "Concerning Growth of Young Bosnia"
ww1_bosnia.2.d: "Many schools and universities across Bosnia have begun to see more political oppositionist agitation coming from a new group called the Mlada Bosna, or Young Bosnia. Popular among students, this group is causing Bosnian-nationalist agitation and is spreading cancer beliefs like separation from the Austro-Hungarian condominium, igniting a revolution to break free from Austrian chains, and even uniting with independent Balkan-Slavic nations like Serbia."
ww1_bosnia.2.a: "Is anyone a moderate in this country?"

ww1_bosnia.3.t: "-- Transmission from the Developers --"
ww1_bosnia.3.d: "Hello dear player: thanks for checking out Bosnia.\nBosnia is a condominium of Austria and Hungary, which means both countries hold (on paper) equal dominion over Bosnia. In reality, the joint ministry of finance, the Emperor himself, and the emperor-appointed governor-general are the only people with any say in the politics of the condominium.\n\nBosnia goes through a rough time of authoritarianism in this time period, with censorship in the Bosnian parliament (the Diet) and their power being extremely limited, whilst the governor and finance ministry are off exploiting the country freely, like a colony of some sort.\n\n\nAre you sure you meant to play Bosnia? We understand. It's okay."
ww1_bosnia.3.a: "I know what I'm doing!"
ww1_bosnia.3.b: "Meant to play Montenegro!"

ww1_bosnia.4.t: "1910 Bosnian Parliamentary Elections"
ww1_bosnia.4.d: "72 Members of Parliament were elected in the results of the Bosnian parliamentary elections. Three major political parties showed up on the voting booth ballots: the Srpska narodna organizacija, the Muslimanska narodna organizacija, and the Hrvatska narodna zajednica. The SNO won 31 seats, the Muslim People's Organization won 24 seats, the Hrvatska narodna zajednica won 12 seats, and a new party, Hrvatska katolička udruga, won 4 seats. An independent Jewish candidate also won one seat."
ww1_bosnia.4.a: "Progress!"

ww1_bosnia.5.t: "First Session of the Diet Starts"
ww1_bosnia.5.d2: "There were loosened tensions by the Croat and Serb members, as everybody seemed to be forming a coalition to advocate for greater autonomy and self-governance for the nation of Bosnia. Emperor [AUS.GetLeader] has recently visited the city and his presence can still be felt. The Diet was opened by Governor-General Marijan Varešanin, and he might have had a favorable impression as the three parties managed to come together and agree on the 1910 budget. Hopefully, this good start and pace will be kept in the Diet."
ww1_bosnia.5.a: "Promising start!"

ww1_bosnia.6.t: "Bosnian Diet Sends Memorandum"
ww1_bosnia.6.d: "Following the resignation of Burian from Bosnia's head in the Austrian pillars of the government, the Bosnian Diet's ministers must have thought that it would be their lucky day, as they sent us a memorandum revindicating many rights such as a change to the Diet's election system, a general increase in the Diet's rights, higher autonomy for the condominium's economy, and other unimaginable ideas. They must have thought that our new minister is naive and green, but the situation is quite the opposite."
ww1_bosnia.6.a: "Disappointing"

ww1_bosnia.7.t: "Austria Refuses Memorandum"
ww1_bosnia.7.d: "Austria has refused to accept the revindications in our memorandum we sent to them yesterday, which asked for many needed reforms to the country's parliamentary and governmental system. They called it 'insulting' and 'egregious'."
ww1_bosnia.7.a: "What the...?"

ww1_bosnia.8.t: "Stephan Burian Resigns"
ww1_bosnia.8.d: "The Austrian Joint Minister, who is kind of like our boss, has resigned amidst the tiredness of managing the anger of the Bosnian population and the frustration of the Austrian bureaucrats."
ww1_bosnia.8.a: "Goodbye"

ww1_bosnia.9.t: "Bosnian Diet Proposes Negotiation"
ww1_bosnia.9.d: "After having rejected their gullible attempt at more internal autonomy, some of the Diet's politicians have come back for negotiations. Time has to pass, and all Diet members will realize they are losing much more than Vienna without a budget for the condominium. Currently, they do not have enough for a 'stable' government, so concessions on their side might also be necessary..."
ww1_bosnia.9.a: "Let's hear it"

ww1_bosnia.10.t: "Third Diet Session"
ww1_bosnia.10.d: "This Third Diet session takes place during a troublesome time in Bosnian politics, as a growing open feud between this Diet and Vienna has led to many restrictions imposed by the Viennese overlords. Recently, a second iteration of the road construction bill has been passed, but only due to the manipulative tactics of the current finance minister. Almost everyone is getting more and more distant from Vienna, and the shaky majority that forms this Diet session is full of doubts. To fix this incoming disaster, there are plans to finally solve the language issue: the main source of uncountable angry voices in Bosnia and Herzegovina."
ww1_bosnia.10.a: "Hope dies last"

#ww1_bosnia.11.t: "Vienna accepts to negotiate"
#ww1_bosnia.11.d: ""
#ww1_bosnia.11.a: "Propose that we are less bitchy"

ww1_bosnia.12.t: "Bosnian Diet Has Demands..."
ww1_bosnia.12.d: "...but fewer than before! They have held back some of their 'revindications' and left some demands for expanded autonomy on economic and internal affairs."
ww1_bosnia.12.a: "Suspend their parliament"
ww1_bosnia.12.b: "We really can't progress without compromises?"

ww1_bosnia.13.t: "The Language Issue"
ww1_bosnia.13.d: "The language issue was brought up by Serbian lawmakers and other members of parliament today. Their demand is total language freedom and the usage of Serbo-Croat in all condominium affairs! An agreement could not be reached; the Serbs decided to boycott and obstruct the Second Diet session."
ww1_bosnia.13.a: "Jebiga..."

ww1_bosnia.14.t: "Compulsory Education Bill"
ww1_bosnia.14.d: "This new law introduces compulsory education for the children of Bosnia, except for those in confessionals, female Muslims, and any disabled students. It strengthens our grip over schools, making the system more politically-driven, at least toward our side. Making school compulsory will drag up the currently low attendance rate... of course. We hope to broaden the inclusion of education from Sibjan-Mektebis and confessionals to a more centralized, federally funded system that will help drive up the abysmal literacy rate, reminiscent of the Ottoman era."
ww1_bosnia.14.a: "We are still at least a century behind."

ww1_bosnia.15.t: "Teachers Petition for a Better Position"
ww1_bosnia.15.d: "In Bosnia, the position of a teacher is still very undervalued by the government and Bosnian society. The hard-working teachers of Bosnia are petitioning for a better position in society and higher wages. We must rally behind this cause to help the literacy rate rise and eventually shift the population into something other than agriculture."
ww1_bosnia.15.a: "An apple a day"

ww1_bosnia.16.t: "Diet Tackles the Agrarian Question"
ww1_bosnia.16.d: "Bosnia has had an unresolved agrarian question lingering over farmers ever since the Austrians took over from the Ottomans: a lot of the land was under a peasant system known as the Kmets system, in which a few Muslims held large swaths of arable land on which many Serbs worked. The Bosnian Diet today passed a law that allows the voluntary conversion of Kmets to freehold ownership."
ww1_bosnia.16.a: "Finally!"

ww1_bosnia.17.t: "Second Diet Session Ends"
ww1_bosnia.17.d: "The second Diet session terminated today in a troubled and problematic Bosnian political climate. The unresolved language issue, the agrarian question, and the public fallout with Vienna have left the parliament divided, but the session still takes place, mainly to determine what should happen with Vienna. A few laws still passed, but except for those few, most will never get close to a majority in this Diet session."
ww1_bosnia.17.a: "Nothing ever happens"

ww1_bosnia.18.t: "Third Diet Session Ends"
ww1_bosnia.18.d: "The Third Diet session ends with almost nothing being completed during its duration. Underwhelming 'progress' has resulted in almost zero laws and bills. With this lack of progress, Vienna is reconsidering the budgets it sends to this 'black hole' for investments. The language question still hasn't been solved, and we possibly might have missed out on our last chance to fix it..."
ww1_bosnia.18.a: "Not good"

ww1_bosnia.19.t: "Potiorek Succeeds Varešanin"
ww1_bosnia.19.d: "After the assassination attempt on him last year, Marijan Varešanin requested a dismissal, which was soon accepted. A successor has been found hastily: General Oskar Potiorek, a candidate for the position of Chief of the General Staff. He is a Czech loyalist, known for being among the plausible candidates for the position of Chief of Staff for the Austro-Hungarian military forces."
ww1_bosnia.19.a: "We wish him good luck!"

ww1_bosnia.20.t: "Fourth Diet Session Starts"
ww1_bosnia.20.d: "Although on paper it says that the fourth Diet session starts on the same day the third session ended, in reality, that is a lie. The last session, while an improvement compared to the second session, was again plagued by obstructionist opposition led by radical Serbs. Additionally, the language question problem has been on the table for more than two years with little to no progress. Due to recent partial elections, the Diet begins the session with a stable and seemingly loyal majority, but the masses are stirring, and we might not have much time before this powderkeg explodes nearby."

ww1_bosnia.21.t: "Road Construction Bill"
ww1_bosnia.21.d: "Today, a large packet of plans for road and railway construction was presented to the Diet. The issue presented is that the language used in these infrastructure projects is inadequate for the Bosnian populace. The road and railway signs, along with communication with employees on the railways, are, according to the bill, only in German or Hungarian—languages that almost no one speaks in Bosnia and Herzegovina except the governor-general and his lackeys. This mentioned bill, although generous according to most of the Diet, is unpassable in its current form. This might be considered a catastrophe, as Vienna demanded from the governor-general that this law should pass unopposed."
ww1_bosnia.21.a: "Disastrous!"

ww1_bosnia.22.t: "Austria Accepts Our Demands"
ww1_bosnia.22.d: "Our demands for extended autonomy have been accepted by the Austrian parliament."
ww1_bosnia.22.a: "Someone makes a useless event and then writes over them; I truly wonder who is doing that and hasn't done the localization here. Sad."

ww1_bosnia.23.t: "Tuzla Salt Mines Investigation"
ww1_bosnia.23.d: "Kočić's fierce demand for an investigation into alleged discrepancies at the Tuzla salt mines is finally being answered. The mines are under Solana JSC Tuzla, founded in 1884, and remained under direct Austrian control. Since it is a state-owned business venture, the investigation can be somewhat redirected..."
ww1_bosnia.23.a: "It isn't that serious"
ww1_bosnia.23.b: "Stay true to ourselves"

ww1_bosnia.24.t: "Muslim Parties Merge"
ww1_bosnia.24.d: "Two rival factions, the Muslim People's Organization (MPO) and the Muslim Independent Party, merged together to form the United Muslim Organization today. This fact shouldn't bother many, as the Muslim Independent Party had no seats in the Diet; in many matters, this is just a formal change that may eventually lead to more or less moderate members of the Diet. The measure has been somewhat unproductive as some current Diet members, part of the MNO, have left their seats vacant in sign of protest against this disputed merge. The seats will be refilled by the party almost automatically, but something should be done about these unruly seat vacancies in the future."
ww1_bosnia.24.a: "Interesting"

ww1_bosnia.25.t: "The Croat Parties Approach Us"
ww1_bosnia.25.d: "The Croat parties HNZ and HKU, each on different occasions, pledged support to Vienna and the governor-general to help pass laws in the Diet, for seemingly no particular benefit. These parties both support the Austrian annexation of Bosnia, for they see it as progress toward unification with the rest of the Croats under an Austrian throne. Some doubt this generosity, but we really have to accept as much support as possible to bypass over 30 oppositionist members of the Orthodox block. If they are to be trusted, we now have around 30 loyal members of the Diet, which isn't enough, but it is progress."
ww1_bosnia.25.a: "Let's see how long that lasts..."

ww1_bosnia.26.t: "Closure of the Diet!"
ww1_bosnia.26.d: "Recent language compromises between Croats and Serbs, which were at first beneficial to them and consequently everyone as they mended their relations, became unacceptable once their letter arrived. The demand for using exclusively Serbo-Croatian in all forms of communication, official or unofficial, struck a nerve with many. Tensions were already high, but Viennese officials see the closure of the Bosnian Diet as the only solution. This unprecedented closure has been met with more protests, which are luckily already winding down."
ww1_bosnia.26.a: "Unheard of!"

ww1_bosnia.27.t: "Second Diet Session Starts"
ww1_bosnia.27.d: "The first session ended disastrously with the attempted passage of the road bill. Conflicts were present before the voting, but definitely not on this scale. Laws were still passed and some loyalties survived the session, but not a single person would call that session satisfactory or anything similar. The second session starts with a shaky majority and unanswered questions on how to deal with Serbian obstructionism and how to pass the road construction bill."
ww1_bosnia.27.a: "Hope it goes well!"

ww1_bosnia.28.t: "Ali-beg Firdus Passes Away"
ww1_bosnia.28.d: "This morning, Ali-beg Firdus passed away in Sarajevo. Born in Ottoman Bosnia, he was a prominent figure advocating for Bosniak Muslims' rights and helped found the Muslim People's Organization. He protested the Austrian annexation of Bosnia in 1908, but still became the first speaker of the Bosnian Diet. Unfortunately, he spent most of his short tenure in bed with difficult ailments. The nation mourns this beloved and peaceful figure, often seen as a unifying force for Muslims of all nationalities."
ww1_bosnia.28.a: "Počivao u miru"
ww1_bosnia.28.b: "Airqud fi salam"

ww1_bosnia.29.t: "Sulejman Šarac Resigns as Grand Mufti for Bosnia"
ww1_bosnia.29.d: "Sulejman Šarac, an influential figure for Islam in Bosnia, has resigned as Grand Mufti for Bosnia. He leaves behind a position filled with honor in the Islamic world, as he was the highest Islamic legal authority in Bosnia. He states he resigned because he wants to focus on family matters and science."
ww1_bosnia.29.a: "Sadge"

ww1_bosnia.30.t: "1913 Partial Elections - Results"
ww1_bosnia.30.d: "The incoming elections are, interestingly enough, not important to the populace. People seem genuinely pacified, of course, just for a moment. This spirit could be used for our gain; finally achieving a proper Diet majority, free of SNO radicals. Technically a branch of the SNO—a newspaper and really just a group of people centered around Danilo Dimović, the only pro-Vienna Serb politician with any traction—is our hope for these elections. Seats are open for 12 Serbs in specific regions, so a campaign of any kind might be practically impossible and ineffective."
ww1_bosnia.30.a: "Let's hope for the best"

ww1_bosnia.31.t: "Austria Blocks Ban on German in Internal Communications"
ww1_bosnia.31.d: "According to the response from the Diet's overlords, such a demand is unimaginable, rude, disrespectful, and unacceptable. The Diet is as happy with that response as Vienna was with the initial request. Such a response to the Diet's request is, according to the superstitious, a bad omen, since this is one of the first requests in this direction."
ww1_bosnia.31.a: "Scheiße!"

ww1_bosnia.32.t: "Bosnian Diet Removes Use of German in Internal Communication"
ww1_bosnia.32.d: "In an attempt at gaining more autonomy and independence from their overlord, the Diet of Bosnia and Herzegovina has decided to pass a law in their parliament removing the use of German in their official documents and other internal communications. This is clearly an attack on our integrity and governance which cannot be tolerated, regardless of the fact that they are a new and unaware government."
ww1_bosnia.32.a: "Block that bill!"
ww1_bosnia.32.b: "Let them speak whatever"

ww1_bosnia.33.t: "Vienna Blocks Removal of Hungarian on Bosnian Railways"
ww1_bosnia.33.d: "Even though the anti-Hungarian bill passed, this proposal struck a nerve with the overlords in Vienna, and the response back was humbling. Vienna did not see this as a reasonable request, arguing that this is a condominium and not an offshore colony. Well, everyone is aware of that, but Hungarian here is more of a joke than a serious way of communication. Even then, it is probably misused. In any case, the Diet should hold off on any requests Vienna might find brazen."
ww1_bosnia.33.a: "Baszdmeg!"

ww1_bosnia.34.t: "Bosnian Diet Plans to Remove Hungarian Signs on Railways"
ww1_bosnia.34.d: "In pure defiance of authority, an appeal has been sent from the Bosnian Diet 'politely' asking for the complete removal of Hungarian signs and language on the Bosnian railways. This shenanigan was apparently voted upon in the newly established Bosnian Diet and eventually passed almost unopposed. For such disgraceful behavior, the Diet will be reprimanded."
ww1_bosnia.34.a: "What are they thinking of themselves!"
ww1_bosnia.34.b: "Well... that might play into our hand..."

ww1_bosnia.35.t: "Postal Savings Bank Bill"
ww1_bosnia.35.d: "The Postal Savings Bank, which all Diet members wished for so much, might be a bigger issue than we thought. At first, everyone was accepting of the Austrian proposal for a much-needed bank based in Bosnia and Herzegovina, but soon after hearing the rest of the bill, many realized there will not be much autonomy in this bill. The planned bank is tied to Vienna and has no connection to the Diet. Loyal elements shrugged that off, but Serbian members of the Diet who are part of the current majority are furious with such a proposal. If the bill passes, it might be more due to goodwill than the honesty of the Diet members' hearts."
ww1_bosnia.35.a: "They are making a big deal out of this!"

ww1_bosnia.36.t: "Second Road Construction Bill"
ww1_bosnia.36.d: "Reichsfinanzminister Bilinski is keeping his pace, and it seems that he is successfully forcing the opposition into accepting his new bill. Well, not really a new bill, but more of a masked iteration of the notorious Road Construction Bill. Slight changes are there, but this time it will not fail! The reason is the budget, fear of losing paychecks, the collapse of the Diet, and a few other (possibly empty) threats that make its passage unavoidable."
ww1_bosnia.36.a: "Well done, Bilinski!"

ww1_bosnia.37.t: "Vote on Hospital Bill"
ww1_bosnia.37.d: "On the table is a simple bill proposing funding for the condominium's poorly kept hospitals and further improvements to healthcare, along with building a whole new 'Pavilion K' in Sarajevo's Landesspital. All sides are content with this real piece of progress, which will undoubtedly save many lives in the future."
ww1_bosnia.37.a: "Who said the Diet is dysfunctional?"

ww1_bosnia.38.t: "The Diet's Own Memorandum"
ww1_bosnia.38.d: "Leon von Bilinski, the Joint Finance Minister, met us at an Inner-Party Conference and demanded that we pass a Road Construction Bill. He would offer his full support, as Stephan Burian had done, but..."
ww1_bosnia.38.a: "This is ridiculous"

ww1_bosnia.39.t: "Student Protests Get Out of Hand"
ww1_bosnia.39.d: "The Hungarian flag is burning in Sarajevo right now! There is a massive group of protesters, mostly students, in all public spaces shouting phrases, united regardless of their ethnicities. Every Hungarian and German person and official is scared to the bone at such a sight. Calling for violence, the unification of all Slavs, peace between nationalities, radicalizing public speeches, and total disobedience are what every person sees! A general strike has been called by these students. Secret societies are recruiting, and public distrust is at an all-time high. Something must be done about this situation!"
ww1_bosnia.39.a: "Crush this by any means necessary!"
ww1_bosnia.39.b: "Disperse the crowds, but be careful!"

ww1_bosnia.40.t: "Second Road Construction Bill"
ww1_bosnia.40.d: "Thanks to Bilinski's way of forcing the issue, construction can now be finished. Technically, roads were being built even before the bill passed or was even voted on; the road signs were the issue. Well, the law has passed, but the Muslims and Serbs are furious, and the Croats are not the happiest with this either, so the new goal should be mending relations to continue the sessions."
ww1_bosnia.40.a: "The storm is over. Right?"

ww1_bosnia.41.t: "Diet Collapse!"
ww1_bosnia.41.d: "Bilinski saved Bosnia by passing the budget and the road bill, but at the cost of almost half of the MPO and all of the SNO members leaving the Diet session right in the middle of debating minor issues and compensations. Shouting and even a few threats were heard all around the building. The members who exited the session claimed that the second session is permanently over. A feeling of betrayal was the predominant feature on the obstructionists' faces, along with anger. The session is truly over, but what to do now?"
ww1_bosnia.41.a: "A bit childish"

ww1_bosnia.42.t: "The Croatian Sabor Dissolves"
ww1_bosnia.42.d: "The Ban of Croatia-Slavonia, Slavko Cuvaj, has dissolved the Croatian Sabor soon after he was elected to power and suspended the constitution, basically imposing direct rule. Opposition grew in the streets of Croatian cities and towns, and even in Bosnian towns, where a part of the population lives and speaks Croatian. They were soon joined by non-Croat protesters in an all-out protest against the Ban's actions."
ww1_bosnia.42.a: "Many such cases."

ww1_bosnia.43.t: "Student Demonstrations in Bosnia"
ww1_bosnia.43.d: "In response to the Ban of Croatia-Slavonia, under Budapest, dissolving the Croatian parliament and suspending the constitution, many demonstrations took place in Bosnia, where a large Croatian population lives. It is unclear how long these demonstrations will last."
ww1_bosnia.43.a: "Are they done yet?"

ww1_bosnia.44.t: "The Muslim-Trialism Theory"
ww1_bosnia.44.d: "In the northwest corner of Bosnia, there exists a rare, almost homogeneous grouping of Bosniak Muslims. According to multiple historians, these Muslims are all indigenous converts. Croatian politicians like this interpretation; so much so that even Ante Starčević called the area 'Cvijet Hrvatske' (the Flower of Croatia), supporting the claim that these people are kin to medieval Croats, unlike in most Croatian lands. By promoting this theory, we will get overwhelming Croat support and the possibility of a permanent Croat-Muslim partnership, whether political or in everyday life. This might counter Yugoslav ideas by sowing a greater divide between Croats and Serbs, at the price of angering the populace..."
ww1_bosnia.44.a: "Great, implement it now!"
ww1_bosnia.44.b: "Approach it slowly; this is playing with fire..."

ww1_bosnia.45.t: "Diet Votes on the Language Bill"
ww1_bosnia.45.d: "The Bosnian Diet composed a new bill on the usage of official language in the condominium. For now, only SNO signatures are behind it, as a large campaign among representatives of the Diet is going on. The bill proposes that Serbo-Croatian becomes the one and only language in condominium affairs, which isn't sitting well with the 20 non-elected officials and 16 Croat members, who demand that Croatian be used instead. The Muslims, always adhering to neutrality, might be the deciding factor if they mend relations with the Serbs..."
ww1_bosnia.45.a: "Bound to fail..."
ww1_bosnia.45.b: "Croats cave in!"

ww1_bosnia.46.t: "Diet Votes on the Language Bill"
ww1_bosnia.46.d: "The last meeting about the language issue was met with fierce opinions on all sides. Eventually, the bill collapsed even before reaching Vienna. This time, the Croats are a bit more reasonable, and it seems like the people of Bosnia and Herzegovina might finally be allowed to speak their own language, as the partial language bill passes."
ww1_bosnia.46.a: "Another pyrrhic victory."

ww1_bosnia.47.t: "The High-treason process of [GetYear]"
ww1_bosnia.47.d: ""
ww1_bosnia.47.a: ""

ww1_bosnia.48.t: "Someone big dead in jail or something else"
ww1_bosnia.48.d: ""
ww1_bosnia.48.a: ""

ww1_bosnia.49.t: "Railway Bill Passed!"
ww1_bosnia.49.d: "After tenuous negotiations, the railway bill has been passed. The bill again had issues over language, but to a lesser extent than last time. Especially since this time, the bill included practically no signs, just new railways and funding, which is an issue to no one. Parts of the railways included in the bill are the new line Srnetica-Jajce and the improvement of the Sarajevo-Bosanski Brod lines that connect the condominium's capital to Slavonia and the rest of the Empire."
ww1_bosnia.49.a: "Glad to hear!"

ww1_bosnia.50.t: "First Diet Session Collapses"
ww1_bosnia.50.d: "The first-ever Bosnian Diet parliamentary session has collapsed due to internal conflicts in favor of or against the Road Construction Bill."
ww1_bosnia.50.a: "Not good!"

ww1_bosnia.51.t: "Dealing with Bosnian Terrorism"
ww1_bosnia.51.d: "Exactly two weeks have passed since the governor-general, Marijan Varešanin, was missed by five bullets by some stroke of luck. The event was completely unexpected. Žerajić, a self-proclaimed anarchist, was according to sources also in Sarajevo a week ago when Franz Joseph came to visit, but did not dare to kill the Emperor, although he had planned it. Most media portrayed this event as the action of a mentally unstable person. Žerajić's motive is possibly found in Risto Radulović's article, where the author wrote about tragedies as necessary to temper the struggle of Bosnian Serbs. Frightening as it is, we cannot dwell too much on this event and must steer the media away from the topic, as it might be the radicalizing factor needed for so many disloyal elements in this part of the Empire."
ww1_bosnia.51.a: "Horrifying!"

ww1_bosnia.52.t: "Bosnia Requests Bank Expansion"
ww1_bosnia.52.d: "The Bosnian Diet has demanded an upgrade of their postal bank, likely with the intent of gaining more autonomy. It is true that Bosnian banking is in shambles, but we cannot shower them with gifts, for they will be taken for granted. Should we accept, additional modernization will be given, but also more autonomy, with a bigger price tag. If denied, privately-owned foreign banks might alienate the area, but spare us administrative trouble."
ww1_bosnia.52.a: "Well, we have to help out"
ww1_bosnia.52.b: "A tighter leash is always a better choice"

ww1_bosnia.53.t: "Vienna Accepts Bank Expansion"
ww1_bosnia.53.d: "Vienna has sent over their delegate to announce to us: they accept the Bosnian Postal Bank expansion to help the country. Persuasiveness and almost begging from Bosnian diplomats bore fruit. Real progress for the condominium's economy has been achieved, and a step toward proper modernization as well."
ww1_bosnia.53.a: "I won't lie, this was unexpected"

ww1_bosnia.54.t: "Vienna Refuses Bank Expansion"
ww1_bosnia.54.d: "In a foreseeable switch, Vienna has refused our request to expand our banking. The postal bank is going to be operated by central banks outside of the condominium as previously agreed, without any care for the people who use it and depend on it. Nobody is content with such an announcement, and a wave of mistrust is incoming."
ww1_bosnia.54.a: "Time to bow our heads again"

ww1_bosnia.55.t: "Immediate Closure of the Bosnian Sabor"
ww1_bosnia.55.d1: "Following the tragic events in Sarajevo today, Vienna has ordered the closure and shutdown of all current or future Bosnian Diet meetings and discussions. Due to a combination of general distrust, poor relations, and instability, which to a decent extent can be blamed on ourselves, this might be the effective end of all autonomy for the condominium of Bosnia and Herzegovina.\n\nThe balancing act was unsuccessful, and as a consequence, the rest of the passable laws are locked. Well, it was a good run."
ww1_bosnia.55.d2: "Following Vienna's participation in the war, they are worried that many Serbs, who are also members of the Diet, will sabotage their mission to achieve victory. They have suspended the Bosnian Diet on short notice, with nothing but a silent comment that this suspension might not be permanent..."
ww1_bosnia.55.a: "Not everyone is a Gavrilo!"
ww1_bosnia.55.b: "A tragedy for democracy..."

ww1_bosnia.56.t: "Bosnia Asks Control of [760.GetName]" 
ww1_bosnia.56.d: "Bosnia has asked for control of our occupied lands of [760.GetName], since [761.GetName] is already under their partial jurisdiction. Top military generals like Conrad von Hotzendorf and many Bosniak Muslims support this idea. The area was part of the Bosnia Vilayet, which is technically the condominium's predecessor, but due to the circumstances of the 1878 Austrian campaign to claim Bosnia and its annexation in 1908, it stayed part of the Ottoman holdings in the Balkan peninsula. Since the area is inhabited by Serbs and Bosniak Muslims, not much would change, and the question of the area's administration would be solved by itself."
ww1_bosnia.56.a: "Why not?"
ww1_bosnia.56.b: "They are fragile enough"

ww1_bosnia.57.t: "[FROM.GetName] Transfers Over Occupied Serb Lands"
ww1_bosnia.57.d: "The transfer has been accepted! The occasion is worthy of celebration, but we cannot stall now. Some sort of integration of our societies is necessary regardless of their future position in the condominium, which has yet to be decided."
ww1_bosnia.57.a: "Update the maps, we've expanded!"

ww1_bosnia.58.t: "[FROM.GetName] Refuses Transfer of Serb Territory"
ww1_bosnia.57.d: "[FROM.GetName], currently occupying this land, refused to accept the transfer to its rightful controller. Unexpected to many, the territories will not be reunited into the former borders of the Bosnia Vilayet, a fond memory of Ottoman administration to many in Sanjak and surrounding areas."
ww1_bosnia.57.a: "Well, it was a bit ambitious..."

ww1_bosnia.59.t: "Vote on Land Redistribution"
ww1_bosnia.59.d: "With our law on Kmets' conversion, it was expected that more bills and laws on the land issue would follow soon. Well, it took a lot of time, but now with a finally stable coalition, we are ready for a bold move! Redistribution of land! The opposition should support this, as the law plays into their hands too... Well, all we need is for the Muslims not to start obstructing. To mend this transition, we could technically stall this law a bit for a more careful and slowed-down implementation."
ww1_bosnia.59.a: "Let's implement it quickly!"
ww1_bosnia.59.b: "Let's go slow..."
if_wait_year_BOS_TT_TT_I_LOVE_THIS_GAME: "If you wait a year, and the Diet goes without interruption, these effects will be applied:\n"

ww1_bosnia.60.t: "Diet Votes on the Land Redistribution Bill"
ww1_bosnia.60.d: "After lengthy discussions, some progress on the land issue has finally occurred. The Muslim Diet members finally caved in and agreed on the outlines of the incoming land redistribution bill after concessions on both sides. The bill will bring changes that will better the position of landless Serbs and Croats too, to some extent."
ww1_bosnia.60.a: "Astounding."

ww1_bosnia.61.t: "Impending Land Reform Cancelled"
ww1_bosnia.61.d1: "The impending land reform was cancelled due to the Diet closure. As the land reform law was agreed to be put into action in multiple steps, the closure of the Diet abruptly ended its implementation. Austrian officials recommended to us to retrace our steps or leave it as it is, in their infamous emotionless tone."
ww1_bosnia.61.d2: "The impending land reform has been stopped as the Diet has closed due to the Austrian entry into the war. Austrian officials recommended that we stop the aforementioned program for the time being. In an undertone, some claim to have understood the message: that the Diet's closure is just a temporary act out of pure precaution, against which we cannot argue much, or at all."
ww1_bosnia.61.a: "It is what it is"

ww1_bosnia.62.t: "First Diet Session Ends"
ww1_bosnia.62.d: "The first Diet session ends with moderately satisfactory results. Uncountable, seemingly unsolvable topics and issues have been acknowledged and are being dealt with. Opinions differ on the quality of its meetings, but if anything, it ended on good terms. Still, the road construction bill should be addressed soon, whether it is during an official ongoing session or not."
ww1_bosnia.62.a: "Pretty good, if you ask me"

ww1_bosnia.63.t: "Managing the Occupation of Taslica"
ww1_bosnia.63.d: "The Montenegrin part of Sanjak is now confined within the condominium's borders, although only in a temporary way as the command told us. In the occupied area is a decent Bosniak Muslim minority and a large Serb minority, both of which are part of the current ethnic composition. The population and Diet members are confused by this change and, as always, bicker and argue over their different opinions. What's certain is that with a little push, this could permanently stay as part of the condominium, as it was once part of the Ottoman-era 'Bosnia Vilayet'."
ww1_bosnia.63.a: "I don't mind expansion!"

ww1_bosnia.64.t: "The 'Scutari Crisis'"
ww1_bosnia.64.d: "Serbia and Montenegro are refusing to give up their Ottoman-conquered land to the newly independent state of Albania. One person reacting furiously to this news is [BOS.GetLeader], who has declared a state of emergency, suspended Serb cultural associations, and suspended the Sabor due to this event."
ww1_bosnia.64.a: "Silence them"

ww1_bosnia.65.t: "Second Diet Session Scheduled"
ww1_bosnia.65.d: "The second Diet session has been scheduled for around 50 days from now. It is time for Bosnian lawmakers to prepare what they will propose to the assembly."
ww1_bosnia.65.a: "Let's not get our hopes up"

ww1_bosnia.66.t: "Third Diet Session Scheduled"
ww1_bosnia.66.d: "After the end of the previous session, the third Diet session is scheduled to take place. The next session should tackle the language issue once and for all, since debate over it takes up time allocated for other laws and bills by the agitating opposition."
ww1_bosnia.66.a: "Something is happening."

ww1_bosnia.67.t: "Bosnia Sends Us Manpower"
ww1_bosnia.67.d: "Bosnia sends us manpower. Amazing."
ww1_bosnia.67.a: "We like men"

ww1_bosnia.68.t: "Bilinski Defiant!"
ww1_bosnia.68.d: "The Joint Finance Minister of the Empire, Leon Bilinski, is adamant on the language issue in the condominium. Along with threatening to take away salaries, fire and arrest opposition, and close the Diet, he also threatened to involve the governor-general, who has an even harsher personality. If [BOS.GetLeader] gets involved, all threats might be doubled and put into action faster. That doesn't really matter to the Diet members, who are getting more and more blinded by their courage and righteousness..."
ww1_bosnia.68.a: "This might end badly"

ww1_bosnia.69.t: "Serbian Outcry about Croat-Muslim Teachings"
ww1_bosnia.69.d: "The Serb part of the population has been complaining about new school teachings that promote Croat-Muslim cooperation, making the Serbian minority feel alienated. Claims of state propaganda running directly against Serbs is not a new idea, nor an incorrect one, but such protests cannot be taken seriously by the same people who obstruct Bosnian democracy."
ww1_bosnia.69.a: "Ignore them"

ww1_bosnia.70.t: "Giving Second Chances"
ww1_bosnia.70.d: "It is pretty obvious that Viennese officials, most Diet members, and almost every other aspect of governance in the condominium had a bad start with the Serb minority. Before the situation descends into pure hatred, some have proposed sending an olive branch to the Serb representatives in the Diet. Of course, this will not solve much, but it is a clear change of direction or at least an attempt..."
ww1_bosnia.70.a: "I am still skeptical"

ww1_bosnia.72.t: "Diet Resignation Bill"
ww1_bosnia.72.d: "The everyday pace of the legislature made for a pretty calm discussion today. The conclusion states that in the case of three or more resignations from seats in the Diet by any representative in a span of no more than a week, partial elections for the named positions will be held, due to recurring boycotts by the opposition and threats to the shaky, slim majority."
ww1_bosnia.72.a: "A progressive bill in Bosnia? In this economy?"

ww1_bosnia.73.t: "Restricting Lumber Law"
ww1_bosnia.73.d: "To impose more protectionist regulations on the lumber industry in the condominium, the Diet and the finance ministry made a deal. Nothing remarkable is in this law, as current regulations are almost non-existent."
ww1_bosnia.73.a: "Protect the Forests!"

ww1_bosnia.74.t: "Diet Votes on the School Rework Bill"
ww1_bosnia.74.d: "The school system is, by some standards, Byzantine and perfect for creating dissent among students. Most teachers are foreign-born and lack sympathy for the local population, whom they find subordinate to themselves. Although Bosnia and Herzegovina do not have enough educated people to fill teaching positions, priority in employing locals should be implemented. Also, since our changes to the language law, some restrictions should be lifted."
ww1_bosnia.74.a: "They better be thankful for this!"

ww1_bosnia.75.t: "Serb Word Scandal"
ww1_bosnia.75.d: "Due to [BOS.GetLeader]'s bans on every single Serb organization, some prideful members of the Diet and affected newspapers have resigned from their posts. The reason is honor and some poorly thought-out oath to the suspended newspapers. The consequence of this childish play is 12 empty seats for the Serb minority—the highest number since the Diet's opening. These 12 empty seats will not be inherited by other SNO members, as most thought, due to the recently passed resignation law which demands an election for seats if multiple members resign at once."
ww1_bosnia.75.a: "Pride is truly a sin"

ww1_bosnia.76.t: "Austria Approves of Ban on German in Internal Communication"
ww1_bosnia.76.d: "Austria has approved of our internal ban on the German language. The ban is to sidz."
ww1_bosnia.76.a: "Great!"

ww1_bosnia.77.t: "Austria Approves of Removal of Hungarian Language on Our Railways"
ww1_bosnia.77.d: "Austria has approved of our removal of the Hungarian language on our railways. They agree that Hungarian is an elite language only spoken by higher-ups and not for the common folk who use the railways."
ww1_bosnia.77.a: "Great!"

ww1_bosnia.78.t: "Our Occupation of Taslica"
ww1_bosnia.78.d: "During all the chaos of the Balkan War, Conrad von Hotzendorf suggested using the surrounding chaos in order to snatch contested Ottoman-Montenegrin lands. This morning, our forces moved into the city with minimal opposition."
ww1_bosnia.78.a: "A heist of this level; even the Romanians are jealous!"

ww1_bosnia.79.t: "Ugar Treeworks"
ww1_bosnia.79.d: "After passing our treeworks regulations, a decent firm approached the ministry. Although we have no say in this matter, they were polite enough to show us the proposal and ask if we have any valid objections. None were given, so the job starts immediately. Like it or not, things like this are exactly what we need for better relations with Vienna."
ww1_bosnia.79.a: "Whatever"

ww1_bosnia.80.t: "Austria Event about Ugar Treeworks"
ww1_bosnia.80.d: "stuff"
ww1_bosnia.80.a: "Finally something from the Bosnians"