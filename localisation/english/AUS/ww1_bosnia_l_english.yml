#Focuses
bosnia_focus: "Bosnia Focus Tree"
BOS_first_diet_elections: "Opening of the Diet"
BOS_first_diet_elections_desc: "Established in February 1910, the Landtag von Bosnien und der Herzegovina, or Bosansko-hercegovački sabor in Serbo-Croat, is a representative assembly over the Bosnian Condominium. Elections are planned to be held in May. Vote distribution among each religious group will be distributed along population census that was run last year, so there should not be much surprises, but seeing which parties will lead each ethnic group."
BOS_sno_name_focus: "Srpska Narodna Organizacija"
BOS_mpo_name_focus: "[BOS_muslim_party_name]"
BOS_the_croatian_parties_focus: "The Croatian Parties"
#BOS_budget_1910: "1910 Budget"
#BOS_budget_1910_desc: "1910 Budget is about to be proposed to the newly elected Diet. Vienna tried its best to offer a decent budget that would start of first diet session as peacefully as possible. The 20 unelected members of the Diet already pledged support for its passage, so we should not worry too much yet. We are yet to see who are we dealing with."
BOS_sno_name_focus_desc: "The largest ethnic group in Bosnia and Herzegovina saw enviable results in elections. Every seat possible was won by now the largest faction in the Bosnian Diet, totaling 31 seats. Serbs are by far most unruly nationality in the condominium toward Vienna, so we fear on how will we work with such a large unified block, which claims to be in against Vienna before they've even entered the session."
BOS_mpo_name_focus_desc: "The [BOS_mpo_party], or [BOS_mpo_party_long], has achieved impressive victory over Muslim Independent Party in this election winning all allocated seats for Muslims. Most of the party leadership and elected figures are beys and wealthy Muslim landowners, but that did not matter to the folk. Possible reasoning for such a landslide might be well-known [BOS_mpo_party]'s newspaper 'Musavat' printed in Cyrillic and Latin scripts. The political party at first glance seems neutral towards Vienna, which might become an issue if we do not address it in time."
BOS_the_croatian_parties_focus_desc: "After the elections, the Croats were only nationality that didn't end up with an unified party leading all of their seats. Their vote was split because the HNZ had a quarrel with archbishop Juraj Štadler over embracing Catholicism as a party value. The HNZ neglected the demands saying that all Croats of all faiths are allowed to join and partake in the party's activities. Štadler, discontent with the response, created the HKU, a party that would represent similarly conservative values, but with more focus on faith. Although vote seems to be split, for now we cannot observe any deep divides between the two Croat parties."
only_austria_can: "Only §Y[AUS.GetNameWithFlag]§! can complete this focus"
agree_on_budget_BOS: "The First §YBosnian Diet Session§! has occured"
BOS_if_bill_passes: "If the bill §Gpasses§! in the §YBosnian Diet§!:\n"
BOS_road_construction_bill: "The Road Construction Bill"
BOS_road_construction_bill_desc: "This Road Construction Bill presented to us by Burian is a major road building investment program. Absolute support has been demanded from the Diet by Burian. This bill, although being comprehensive and great improvement for infrastructure, comes with a unlikely to be accepted demand. In the bill, it states that language used on signs and in railways, is to be German and Hungarian only: we are yet to see consequences of such demand."
second_diet_session_ends: "The Second §YBosnian Diet Session§! ends"
third_diet_session_ends: "The Third §YBosnian Diet Session§! ends"
BOS_compulsory_education_law: "Compulsory Education Bill"
BOS_compulsory_education_law_desc: "The literacy rate in the Condominium is equivalent of the rates in other major powers' colonies: near 88% our country is illiterate and unfit to change from rural, stagnant and backwards lifestyle. With this proposed law, we are setting the cornerstone of all education, making existing education compulsory, at least for first four grades. It is not a forceful change, as it is thoughtful of diverse cultures in the area: females of muslim faith, disabled and few other exceptions are reasonably exempt from this law. The Diet seemingly stands united over this issue, hopefully things will stay this way."
BOS_allow_conversion_of_kmets: "Allow Conversion of Kmets"
BOS_allow_conversion_of_kmets_desc: "In 1908, when Austria-Hungary formally annexed Bosnia and Herzegovina, many were disheartened by lack of action on question of serfdom and redistribution of lands, aiming to replace the feudal system. Some defend Vienna by saying that Vienna doesn't allow serfdom and it doesn't force that issue to maintain balance in the region. Others believe it's because Vienna couldn't care less about this land. What we do know is that the Diet will vote on a proposed compromise law tackling the question soon enough."
BOS_purge_german_in_communication: "Purge German in Internal Communication"
BOS_purge_german_in_communication_desc: "One of the many concerns of Muslim, Serbian and some Croatian members of the Sabor is the presence of the German language in practically all official internal communication. For a land that is not literate even in their own language, the rule to use German for official practices is unreasonable. The Diet is preparing to send a demand to Vienna about this issue."
BOS_postal_savings_bank: "Postal Savings Bank"
BOS_postal_savings_bank_desc: "The economy in this region is backwards and incompatible with the rest of the Imperial realm, to the point that a proper bank indigenous to this area does not exist. The finance ministry is preparing a proposal to finally construct one; but under not so favourable terms for ethnicies in the condominium, as they demand higher autonomy in the condominium's economy. Negotiations will be certainly lengthy and this law might not go so smoothly as others before."
BOS_remove_hungarian_lang_from_railways: "Remove Hungarian from Railways"
BOS_remove_hungarian_lang_from_railways_desc: "The Hungarian language, even more foreign to people of Bosnia and Herzegovina than the poorly known German language, is used in railways equally as German. German, some people know, but Hungarian: none. For this proposal that is planned to be sent to Vienna, every ethnic group in condominium stands for, with Croats being most avid supporters of this cause."
BOS_appease_croats: "Appease the Croat Catholics"
BOS_appease_croats_desc: "The Croatian members of our parliament are generally inclined to Vienna and accepting of laws proposed by Vienna. This loyalty needs to be praised and compensated for by shifting our interests slightly to their sides but definitely not entertaining their ideas of Trialism and similar nonsense."
BOS_appease_muslims: "Appease the Bosniak Muslims"
BOS_appease_muslims_desc: "The Bosniak Muslims, unlike Serbs and Croats in the condominium are not a nationalist groupation, but more of a chaotic set of pockets scattered around the condominium where they form a plurality at best. As they are not expansionist, their best choice to stand up for themselves. This wouldn't be a change of course as Vienna has been pushing this idea for a long time."
BOS_cvijet_hrvatske: "A History Lesson"
BOS_cvijet_hrvatske_desc: "Claim that Northwestern Bosniak Muslims are ethnic Croats, is one of the more reasonable claims in the peninsula full of fairytales. This claim, will be supported and used to turn local populace on eachother. Idea is basically to 'Divide and Conquer', with extra steps. Another possible side-product could be permanent Croat-Muslim coalition which will  solve threat of Serbian obstructionism once and for all. All in all, this is a gamble, but at least a well calculated one."
BOS_tolerate_agitators: "Giving Second Chances"
BOS_tolerate_agitators_desc: "Serbs have been having a hard time here and well, officials had with them too. Most of their organizations are being monitored as they were often not so peaceful. It is time to offer a possibility of cooperation; imposing restrictions on Serb media are to be relaxed and they will be peaceful and closer to Vienna's interests. It's argued that deal is equally generous and gullible, which is yet to be seen..."
BOS_begin_second_session: "Begin Round Two"
BOS_begin_second_session_desc: "The First Diet session did not go so smoothly the way many hoped for. Many laws have been passed, but the troublesome road construction bill was too big of a pain to deal with, so much so it alone ended the session. Eventually the bill will have to be passed, ideally soon as possible during this session."
BOS_dealing_with_protestors: "Response to Student-Police Clashes"
BOS_dealing_with_protestors_desc: "Everyone saw what happened in the streets of Sarajevo. No one expected such a fierce stand from protestors for a cause that is not connected to their rights or duties. Such brave stance against questionable Hungarian closure of the Croatian Sabor, yet has to be condemned as such protests threaten to shatter the condominium's shaky stability. On the other hand, most of the seats in our Diet do not support actions of police during these events. No matter what, an official and careful response from Diet have to be sent to the public."
BOS_elect_council_boards: "Elect Council Boards"
BOS_elect_council_boards_desc: "To alleviate strain on Empire's administration, we are tasked with progressively improving current overstretching. Well, currently, many places do not even have proper administration, like regional council boards. Such simple election would be a nice sign to Vienna and betterment of administrative chaos in the area."
BOS_send_memorandum: "Prepare Memorandum"
BOS_send_memorandum_desc: "A new Finance Minister has been appointed. The Diet is preparing to test the ground with a large-scale reformist memorandum, focused on the increasal of its powers, a higher autonomy in the condominium's economy and a complete overhaul of many aspects of the Diet's work ethic and its elections. This memorandum will probably presented after further discussion on postponed inner party conference."
BOS_send_memorandum_tt: "§YPrepare Memorandum§!"
BOS_inner_party_conference: "Inner-Party Conference"
BOS_inner_party_conference_desc: "A friendly inner party conference has been organized to discuss future laws while the Diet is not really in session. Things need to be talked about and of course, memorandum signed and approved by as many as possible members of last session. Right after this conference it is planned to deliver the memorandum to Bosnia's new governor general, [BOS.GetLeader]."
BOS_hospital_construction_bill: "Hospital Construction Bill"
BOS_hospital_construction_bill_desc: "The state of the condominium begs for modernization in all possible ways. Healthcare is one of the top priorities that we need to be more focused on. Such bill would come nicely, as passage of a universally accepted bill after so much infighting could smoothen some issues."
BOS_second_road_bill: "Attempt a Second Road Bill"
BOS_second_road_bill_desc: "Bilinski started strong his tenure, maybe even too strong and harsh, many in the Diet would say. After rejecting memorandum proposed by Diet with threats, he has kept steady pace of forcing bills, issues and confronting opposition head to head. Serbian, mostly obstructionist side dislikes this change of leadership. But budget had to be passed and so does this incoming Road bill. It is a rework of an old one, one which tore apart first diet session..."
BOS_third_times_the_charm: "Third Time's the Charm"
BOS_third_times_the_charm_desc: "The Second Diet session divided brothers and sisters into cut-throat-like situations. It is in disarray and peace sounds unimaginable. Yet somehow here we are; opening a session. This third session is opening out of necessity, mostly because of long-awaited budget passage, which only due to the fact that politicians are not even getting paid anymore. Diet is stuck between a rock and a hard place with a new-found truths: allies are temporary and conflicts are unavoidable."
BOS_something_here: "Diet Resignation Law"
BOS_something_here_desc: "A proposal came recently for establishing rules about resignating as a member of the Diet. It is certainly not something of a high concern, but eventually needs to be tackled and talked about as currently rules are not that well defined."
BOS_first_language_law: "First Language Law"
BOS_first_language_law_desc: "The language issue that has been debated over since first session's early days is again on table. Concessions are maybe finally ready to be made and space for progress is visible. Is it finally time to get over this painful hardship?"
BOS_attract_austrian_investors: "Remaining Austrian Funds"
BOS_attract_austrian_investors_desc: "Of all funds given to Bosnian Diet, there is still some not yet spent money. This could be used for improving standards of living but for small things. The Diet needs to also seal the deal with Vienna and turn on forestry and mining a bit more profitable. Yeah, that's probably on what it's going to be spent, to be honest."
BOS_law_on_language_of_condominum: "Law on Language of the Condominium"
BOS_law_on_language_of_condominum_desc: "Some progress was done, according to some, on the previous law connected to this language issue. Croat parties went into full obstructionism over the mere fact that state language would be Serbo-Croat instead of Croat. Yes, such a seemingly unimportant demand, supported by many Muslims too, is actually one of many sources of great divide between Croats and Serbs. Grudges have to be held off, for both are undoubtedly worse with having German or, God forgive me, Hungarian as an official language. This law proposes Serbo-Croat to become only recognized language in condominium, which won't be something Vienna would like to hear, but that shouldn't be of concern yet as passage of it in Diet is the current focus."
BOS_railway_bill: "The Railway Bill"
BOS_railway_bill_desc: "Ever since Austrian overlords came to Bosnia and Herzegovina, some levels of infrastructure improvements were ongoing. Now it is time to finish big bulk of these projects with new Jajce-Srnetica line and additional funding to Sarajevo line to Slavonia."
BOS_ff_power: "Petition for Trialism"
BOS_closure_from_above: "Closure From Above"
BOS_closure_from_above_desc: "The unruly Diet threatened Vienna with the rejection of 1913 budget, in case of Vienna's rejection of Language Law proposal. To lightly put it, Vienna is furious with such actions, to the point that many rights of Diet will be restricted, possibly even closure of the session."
BOS_attempt_negotiations: "Mending Relations"
BOS_attempt_negotiations_desc: "Some say that Vienna has been way too harsh with the Bosnian Sabor, while others agree with taken actions. What is certain, is that budget has to be eventually passed and for that negotiations with the obstructionists must begin."
BOS_SER_word_issue: "Radical's Media Fiasco"
BOS_SER_word_issue_desc: "Everyone is reading the news lately awaiting [BOS.GetLeader]'s new dismissals and bans on whatever he (reasonably!) deems traitorous. The media has been hit the most, especially Serbian media. Due to restrictions not moving any time soon, many members of SNO are talking about resigning in protest these so-called 'totalitarian measures'. The Serbian final warning strikes yet again."
BOS_election_for_empty_seats: "Election for Empty Seats"
BOS_election_for_empty_seats_desc: "12 members of SNO party have left their seats empty in Diet! These groundbreaking news have to be met with new elections, at least partial for their seats. To ensure balance it will be only among Serbian voters, due to many complexities of Diet's elections system. SNO will most likely regain its lost seats, but not everyone is so certain about this as a new party has entered the ballot list; one that is more pro-Vienna and significantly more moderate. Still, we know nothing and can only hope for the best."
BOS_approach_new_party: "Flirt with Moderates"
BOS_approach_new_party_desc: "The partial elections have been a surprise to everyone. There are already accusations of fraud and rigged elections, which have been proven not to be the case. The new party, although being pro-Vienna, is not in any way connected to overlords. Truth is the police was everywhere during elections and they punished indicent behaviour, which might have angered or scared some of the supporters of the still bigger obstructionist SNO."
BOS_fourth_ses_begin: "Fourth Time's the Charm..."
BOS_fourth_ses_begin_desc: "...or something like that. The fourth session finally opens first meeting on stable ground. The new party opened much wider posibilities of collaboration of with all nationalities. With their vote, the vote of most appointed religious officials, Croats and few moderate Muslims, Diet has achieved a stable majority, as all members of current coalition, except for thenew party, have been involved in practically all laws yet passed. Let's get to business!"
BOS_land_redistribution: "Partial Land Redistribution"
BOS_land_redistribution_desc: "After lengthy talks with Muslims and softening their stances, finally it's time to address the land redistribution bill. When Austrians just came here in 1878, above 90% of land in Bosnia was Muslim owned, even tho they were not a majority or a plurality. The issue will finally be addressed, but naturally as a compromise."
BOS_indigenous_and_free_bank_law: "Indigenous and Free Bank Law"
BOS_indigenous_and_free_bank_law_desc: "Our long-awaited Postal Bank has finally been constructed after all this time of waiting! Now the Diet is eager to demand as many as possible moderate reform to gain at least some reasonable levels of control of its work. No one is too optimistic as tensions in the Europe are increasing, what means that Austria might not like idea of more liberties for this Diet..."
BOS_proudmajority: "Proud Majority"
BOS_proudmajority_desc: "Fruits of our stable majority are visible and must be shown off to the overlords. Sending letters and questions what to do next would be a decent start for this fruitful coalition. War looms around the corner, but one cannot be but optimistic for political course of condominium, for such things do not happen often here."

