#Events
ww1_bosnia.1.d: "An assassination attempt almost came to fruition in vicinity of the Diet. Right after our governor general, Marijan Varešanin opened the Diet and went back in his carriage to his residence, the famous 'Konak'. At a bridge crossing, Bogdan Žerajić fired five bullets in direction of governor general. Varešanin, in shock exited vehicle bewildered, only to see dead body of his assassin. Žerajić committed suicide with the last bullet. This vagueness spared us great turmoil throughout the region. He might have acted alone, but it is more likely he had some sort of support. Further investiagion is necessary and immediate!"
ww1_bosnia.1.a: "These Serbs should get a hold of themselves!"

ww1_bosnia.2.t: "Concerning Growth of Young Bosnia"
ww1_bosnia.2.d: "Many schools and universities across Bosnia have began to see more political oppositionist agitation coming from a new group called the Mlada Bosna, or the Young Bosnia. Popular among students, this group is causing Bosnian-nationalist agitation and is spreading cancer beliefs like separation from the Austro-Hungarian condominium, igniting a revolution to break free from Austrian chains and even uniting with independent Balkan-slavic nations like Serbia."
ww1_bosnia.2.a: "Is anyone a moderate in this country?"

ww1_bosnia.3.t: "-- Transmission from the Developers --"
ww1_bosnia.3.d: "Hello dear player: thanks for checking out Bosnia.\nBosnia is a condominium of Austria and Hungary, which means both countries hold (on paper) equal dominium over Bosnia. In reality joint ministry of finance, Emperor himself, and emperor-appointed governor general are only people with any say in politics of condominium.\n\nBosnia goes through a rough time of authoritarianism in this time period, with censorship in the Bosnian parliament (the Diet) and their power being extremely limited, whilst the governor and finance ministry are off exploiting the country freely, like a colony of some sort.\n\n\nAre you sure you meant to play Bosnia? We understand. It's okay."
ww1_bosnia.3.a: "I know what I'm doing!"
ww1_bosnia.3.b: "Meant to play Montenegro!"

ww1_bosnia.4.t: "1910 Bosnian Parliamentary Elections"
ww1_bosnia.4.d: "72 Members of Parliament were elected in the results of the Bosnian parliamentary elections. 3 major political parties showed up on the voting booth ballots: the Srpska narodna organizacija, the Muslimanska narodna organizacija and the Hrvatska narodna zajednica. The SNO won 31 seats, the Muslim People's Organization won 24 seats, the Hrvatska narodna zajednica won 12 seats and a new party Hrvatska katolička udruga, won 4 seats. An independant Jewish candidate also won one seat."
ww1_bosnia.4.a: "Progress!"

ww1_bosnia.5.t: "First Session of the Diet Starts"
ww1_bosnia.5.d2: "There were loosened tensions by the Croat and Serb members, as everybody seemed to be coalitioning to advocate for a greater autonomy and self-governance for the nation of Bosnia. Emperor [AUS.GetLeader] has recently visited the city and his presence can still be felt. Diet was opened by general governer Marijan Varešanin and he might have had a favorable impression as the three parties managed to come together and agree on 1910 budget. Hopefully, this good start and pace will be kept in Diet."
ww1_bosnia.5.a: "Promising start!"

ww1_bosnia.6.t: "Bosnian Diet Sends Memorandum"
ww1_bosnia.6.d: "Following the resignation of Burian from Bosnia's head in the Austrian pillars of the government, the Bosnian Diet's ministers must have thought that it would be their lucky day, as they sent us a memorandum revindicating many rights such as the change of the Diet's election system, a general increasal of the Diet's rights, a higher autonomy of condominium's economy and other unimaginable ideas. They must have thought that our new minister is naive and green, but situation is quite opposite."
ww1_bosnia.6.a: "Disappointing"

ww1_bosnia.7.t: "Austria refuses memorandum"
ww1_bosnia.7.d: "Austria has refused to accept our revindications in our memorandum we sent to them yesterday, asking for many needed reforms to the country's parliamentary and governmental system. They called it \"insulting\" and \"egregious.\""
ww1_bosnia.7.a: "What the..?"

ww1_bosnia.8.t: "Stephan Burian Resigns"
ww1_bosnia.8.d: "The Austrian Joint Minister, who is kind of like our boss, has resigned amidst tiredness of managing the anger of the Bosnian population and the anger of the Austrian bureaucrats."
ww1_bosnia.8.a: "Goodbye"

ww1_bosnia.9.t: "Bosnian Diet proposes negotiation"
ww1_bosnia.9.d: "After having rejected their gullible attempt at more internal autonomy, some of Diet's politicians have come back for negotiations. Time has to pass and all Diet's members will realise they are loosing much more than Vienna without a budget for the condominium. Currently, they do not have enough for a 'stable' government, so concessions on their side might be also necessary..."
ww1_bosnia.9.a: "Let's hear it"

ww1_bosnia.10.t: "Third Diet Session"
ww1_bosnia.10.d: "This Third Diet session takes place during a troublesome time in Bosnian politics, as growing open feud between this Diet and Vienna has led to many restrictions imposed by Viennese overlords. Recently second iteration of road construction bill has been passed, but only due to manipulative tactics of current finance minister. Almost everyone is getting more and more distant from Vienna and shaky majority that forms this Diet session is full of doubts. To fix this incoming disaster there are plans to finally solve the Language issue, main feud of uncountable angry voices in Bosnia and Herzegovina."
ww1_bosnia.10.a: "Hope dies last"

#ww1_bosnia.11.t: "Vienna accepts to negotiate"
#ww1_bosnia.11.d: ""
#ww1_bosnia.11.a: "Propose that we are less bitchy"

ww1_bosnia.12.t: "Bosnian Diet has demands..."
ww1_bosnia.12.d: "...but less than before! They have held back some of their 're-vindications' and left some demands for expanded autonomy on economic and internal affairs."
ww1_bosnia.12.a: "Suspend their parliament"
ww1_bosnia.12.b: "We really can't progress without compromises?"

ww1_bosnia.13.t: "The Language Issue"
ww1_bosnia.13.d: "The Language issue was brought up by Serbian lawmakers and other members of parliament today. Their demand is total language freedom and usage of Serbo-Croat in all condominiums affairs! An agreement could not be reached: the Serbs decided to boycott and obstruct the Second Diet session."
ww1_bosnia.13.a: "Jebiga..."

ww1_bosnia.14.t: "Compulsory Education Bill"
ww1_bosnia.14.d: "This new passed law introduces compulsory education for the children of Bosnia, except all in confessionals, female Muslims and any disabled students. It strengthens our grip over schools, making the system more politically-driven, at least to our side. Making school compulsory will drag up the currently low attendance rate. We hope to broaden the inclusion of the education from Sibjan-Mektebis and confessionals to a more centralized, federally funded system that will help drive up the abysmal literacy rate, reminiscing of the Ottoman era."
ww1_bosnia.14.a: "We are still at least a century behind."

ww1_bosnia.15.t: "Teachers petition for a better position"
ww1_bosnia.15.d: "In Bosnia, the position of a teacher is still very undervalued by the government and Bosnian society. The hard-working teachers of Bosnia are petitioning for a better position in society and higher wages. We must rally behind this cause to help literacy rate rise and shift population eventually into something other than agriculture."
ww1_bosnia.15.a: "An apple a day"

ww1_bosnia.16.t: "Diet tackles the Agrarian Question"
ww1_bosnia.16.d: "Bosnia has had a Unresolved Agrarian Question lingering over farmers ever since the Austrians took over the Ottomans: a lot of the land was under a peasant system known as the Kmets system in which few Muslims held large swaths of arable land on which worked many Serbs. The Bosnian Diet today passed a law that allows the voluntary conversion of Kmets to freehold ownership."
ww1_bosnia.16.a: "Finally!"

ww1_bosnia.17.t: "Second Diet Session Ends"
ww1_bosnia.17.d: "The second Diet session terminated today in a troubled and problematic Bosnian political climate. The unresolved language issue, the agrarian question and the public fallout with Vienna has left the parliament divided, but the session still takes place, mainly to determine what should happen with Vienna. Still few laws passed, but except these few most will never get even close to majority in this Diet session."
ww1_bosnia.17.a: "Nothing ever happens"

ww1_bosnia.18.t: "Third Diet session ends"
ww1_bosnia.18.d: "The Third Diet session ends with almost nothing being completed during its duration. Underwhelming 'progress' has completed almost zero laws and bills. With this progress Vienna is really reconsidering budgets it sends to this black hole for investments.Language question still hasn't been solved and we possibly might have missed out on our last chance to fix it..."
ww1_bosnia.18.a: "Not good"

ww1_bosnia.19.t: "Potiorek succeeds Varešanin"
ww1_bosnia.19.d: "After the assassination attempt on him last year, Marijan Varešanin requested dismissal which was soon accepted. Successor has been found hastingly, who is to be general Oskar Potiorek, candidate for position of Chief of the General Staff. Czech loyalist, known for being among the plausible candidates for position of Chief of Staff for the Austro-Hungarian military forces."
ww1_bosnia.19.a: "We wish him good luck!"

ww1_bosnia.20.t: "Fourth Diet Session Starts"
ww1_bosnia.20.d: "The Fourth Session starts with good news: the Diet has secured a stable and loyal majority, so we won't have the obstructionism that plagued the previous Diet session. But masses are stirring and we might not have a lot of time before a powderkeg explodes somewhere nearby."
ww1_bosnia.20.a: "What are we waiting for?"

ww1_bosnia.21.t: "Road Construction Bill"
ww1_bosnia.21.d: "Today, a large packet of plans for road and railway construction was presented to the Diet. The issue presented is that the language use in these infrastructure projects is inadequate for the Bosnian populace. The road and railway signs along with communication with employees in railways is, according to the bill, only in German or in Hungarian, languages that almost no one speaks in Bosnia and Herzegovina except the governor-general and his lackeys. This mentionned bill, although generous, according to most of the diet, is unpassable in its current form. This might be considered a catastrophe as Vienna demanded from governor-general that this law should pass unopposed."
ww1_bosnia.21.a: "Disastrous!"

ww1_bosnia.22.t: "Austria accepts our demands"
ww1_bosnia.22.d: "Our demands for extended autonomy have been accepted by the Austrian parliament. "
ww1_bosnia.22.a: "someone makes useless event and then writes sdiz over them, i truly wonder who is doing that hasn't done the loc here. sad"

ww1_bosnia.23.t: "Tuzla Saltmines Investigation"
ww1_bosnia.23.d: "Kočić's fierce demand for investigation over Tuzla saltmines alleged discrepancies are finally being answered. Mines are under Solana JSC Tuzla, founded in 1884 and remained under direct Austrian control. Since it is state owned business venture, investigation can be somewhat redirected..."
ww1_bosnia.23.a: "It isn't that serious"
ww1_bosnia.23.b: "Stay true to ourselves"

ww1_bosnia.24.t: "Muslim Parties Merge"
ww1_bosnia.24.d: "Two rivalrying factions, the Muslim People's Organization (MPO) and the Muslim Independant Party, merged together to form the United Muslim Organization today. This fact shouldn't bother many as Muslim Independant Party had no seats in the Diet so in many matters this is just a formal change that eventually may lead to more or less moderate members of the Diet. Measure has been kind of unproductive as some current Diet members, part of MNO, have left their seats vacant, in sign on protest to this disputed merge. Seats will get refilled by party almost automatically, but something should be done about these unruly seat vacancies in future."
ww1_bosnia.24.a: "Interesting"

ww1_bosnia.25.t: "The Croat Parties approach us"
ww1_bosnia.25.d: "Croat parties HNZ and HKU, each in different occasion, pledged support to Vienna and general governor to help pass laws in the Diet, for seemingly no particular benefit. These parties both support Austrian annexation of Bosnia, for they see it as progress to unification with rest of Croats, under a Austrian throne. Some doubt this generousity, but really we got to accept as much support as possible to bypass over 30 oppositionist members of Orthodox block. If they are to be trusted we have now around 30 loyal members of the Diet, which isn't enough, but is progress."
ww1_bosnia.25.a: "Let's see how long that lasts..."

ww1_bosnia.26.t: "Closure of the Diet!"
ww1_bosnia.26.d: "Recent language compromises between Croats and Serbs, at first beneficial to them and consequentialy everyone as they mended their relations, was unacceptable when their letter came. Demand for using exclusively Serbo-Croatian in all forms of communication official or unofficial struck a nerve with many. Tensions were already high, but with this closure of the Bosnian Diet is the only solution Viennese officials see. Unprecented closure has been meet with more protests, which are luckily, already winding down."
ww1_bosnia.26.a: "Unheard of!"

ww1_bosnia.27.t: "Second Diet Session starts"
ww1_bosnia.27.d: "First session ended disastrously with attempted road bill passage. Conflicts were there, before voting on it but in this scale most definitely not. Still laws were passed and some loyalties survived the session, but not a single person would call that session satisfactory or anything similar. Second session starts with shaky majority and unanswered questions of how to deal with Serbian obstructionism and how to pass road construction bill."
ww1_bosnia.27.a: "Hope it goes well!"

ww1_bosnia.28.t: "Ali-beg Firdus passes away"
ww1_bosnia.28.d: "This morning, Ali-beg Firdus passed away in Sarajevo. Born in Ottoman Bosnia, he was a prominent figure advocating for Bosniak Muslims' rights, and helped found the Muslim People's Organization. He protested the Austrian annexation of Bosnia in 1908, but still became first speaker of Bosnian Diet. Unfortunately, he spent most of his short tenure in his bed in difficult ails. Nation mourns for this beloved and peaceful figure, often seen as a unifying force of Muslims of all nationalities."
ww1_bosnia.28.a: "Počivao u miru"
ww1_bosnia.28.b: "Airqud fi salam"

ww1_bosnia.29.t: "Sulejman Šarac resigns as Grand Mufti for Bosnia"
ww1_bosnia.29.d: "Sulejman Šarac, an influencial figure for Islam in Bosnia, has resigned as Grand Mufti for Bosnia. He leaves behind a position filled with honor in the islamic world, as he was the highest Islamic legal authority in Bosnia. He states he resigned because he wants to focus on family matters and science."
ww1_bosnia.29.a: "Sadge"

ww1_bosnia.30.t: "1913 Partial Elections - Results"
ww1_bosnia.30.d: "Incoming election are interestingly enough, not important to the populace. People seem genuinly pacified, of course, just for a moment. This spirit could be used for our gain; finally achieving proper Diet majority, free of SNO radicals. Technically a branch of SNO, newspaper and really just a group of people centered around Danilo Dimović, one and only pro-Vienna Serb politician with any traction, is our hope for these elections. Seats are open for 12 Serbs in specific regions, so campaign of any kind might be practically impossible and non-effective."
ww1_bosnia.30.a: "Let's hope for the best"

ww1_bosnia.31.t: "Austria blocks ban on German in internal communications"
ww1_bosnia.31.d: "According to response from Diet's overlords, German is the 'only neutral language in Bosnia', which is an untrue claim. However, it is true that we are divided on what to use as a main language, there being Serbian and Croatian. The Diet is currently as happy with a response as Vienna was when they recieved the initial request.This division might cause a further distrust of our politicians in our Austrian overlords."
ww1_bosnia.31.a: "Scheiße!"

ww1_bosnia.32.t: "Bosnian Diet removes use of German in internal communication"
ww1_bosnia.32.d: "Ever since the start of the occupation of Bosnia by us, internal governmental documents were written in Vienna's local language: German. This created a degree of seperation between us, the rulers and the Bosnian population and politicians, the ruled. The Bosnian Sabor have identified many point of views to remove the German language in their internal communications. Firstly, they say that this means that local people that do not have the skill of knowing German cannot work governmental jobs, and it is the carpetbaggers from Bohemia and Salzburg or something that can snatch Bosnian governmental jobs. Lastly, they say that German to Serbo-Croat translation of the communication is often hard and can lead to misleading moments. Of course, those seated at Vienna find this demand insulting, so what should we do about their request?"
ww1_bosnia.32.a: "Block that bill!"
ww1_bosnia.32.b: "Let them speak whatever"

ww1_bosnia.33.t: "Budapest blocks removal of Hungarian on Bosnian railways"
ww1_bosnia.33.d: "Even though the anti-Hungarian bill passed, this proposal struck a nerve with overlords in Budapest, because response back was humbling. They did not see this as reasonable request, like it is, arguing that this is a condominium and not a off-shore colony. Well, everyone is aware off that, but Hungarian is here more of a joke than a serious way of communication. Even then, it is probably misused. In any case, the Diet should hold of any requests Budapest might find brazen (so, anything that makes sense)."
ww1_bosnia.33.a: "Baszd meg!"

ww1_bosnia.34.t: "Bosnian Diet plans to remove Hungarian signs on Railways"
ww1_bosnia.34.d: "The Bosnian Sabor has requested the removal of the Hungarian language on their signs, and replacing it with the language of the land, or whatever they speak in that land. This would kind of make sense since Bosnia, like the rest of the Empire, is a compacted mess of different languages and ethnicities, and they also specified that German could be used as a secondary language. But this bill needs to be blocked as it goes against our policies of Magyarisation and "
ww1_bosnia.34.a: "What are they thinking of themselves!"

ww1_bosnia.35.t: "Postal Savings Bank Bill"
ww1_bosnia.35.d: "Postal Savings Bank, all Diet members wished so much for, might be bigger of an issue than we've thought. At first everyone was accepting of Austrian proposal for a very much needed bank based in Bosnia and Herzegovina, but soon through hearing the rest of the bill, many realised that there will be not much of autonomy in this bill. Bank in plan is tied to Vienna and doesn't have a thing in connection to the Diet. Loyal elements shruged that off but Serbian members of the Diet which are part of current majority are furious with such proposal. If bill passes, it might be more to goodwill than honesty of the Diet member's hearts."
ww1_bosnia.35.a: "They are making a big deal out of this!"

ww1_bosnia.36.t: "Second Road Construction Bill"
ww1_bosnia.36.d: "Reichsfinanzminister Bilinski is keeping his pace and it seems that he is successfully forcing opposition into accepting his new bill. Well not really a new bill, but more of a masked iteration of notorious Road Construction bill. Slight changes are there, but this time it will not fail! Reason is the Budget, fear of losing paychecks, collapse of the Diet and few other (possibly empty) threats that make its' passage unavoidable."
ww1_bosnia.36.a: "Well done, Bilinski!"

ww1_bosnia.37.t: "Vote on Hospital bill"
ww1_bosnia.37.d: "On table is a simple bill, proposing funding into condominium's poorly kept hospitals and further improvements of healthcare along with building a whole new 'Pavilion K' in Sarajevo's Landesspital. All sides are content with this real piece of progress, which will undoubtedly save many lives in its future."
ww1_bosnia.37.a: "Who said Diet is disfunctional?"

ww1_bosnia.38.t: "The Diet's Own Memorandum"
ww1_bosnia.38.d: "Leon von Bilinski, the Joint Finance Minister, met us at an Inter-Party Conference and demanded from us to pass a Road Construction Bill. He would offer his full support, like Stephan Burian had done, but"
ww1_bosnia.38.a: "This is ridiculous"

ww1_bosnia.39.t: "Student Protests get out of hand"
ww1_bosnia.39.d: "The Hungarian flag is burning in Sarajevo right now! There is a massive group of protestors, mostly students in all public spaces shouting phrases, united no matter of their ethnicites. Every Hungarian, German person and officials are scared to the bone with such sight in front of them. Calling for violence, unification of all Slavs, peace between nationalities, radicalizing public speeches and total disobedience are what every person looks at! A general strike has been called for from these students. Secret societies are recruiting and public distrust is at all time high. Something must be done about this situation!"
ww1_bosnia.39.a: "Crush this by any means necessary!"
ww1_bosnia.39.b: "Disperse the crowds, but be careful!"

ww1_bosnia.40.t: "Second Road Construction Bill"
ww1_bosnia.40.d: "Thanks to Bilinski's way of forcing the issues, now construction can be finished. Technically roads were being built and before the bill passed or even was voted on, the road signs were the issue. Well, law is passed, but Muslims and Serbs are furious and well Croats are not happiest with this too, so new goal should be mending relations to continue the sessions."
ww1_bosnia.40.a: "Storm is over. Right?"

ww1_bosnia.41.t: "Diet Collapse!"
ww1_bosnia.41.d: "Bilinski saved Bosnia by passing budget and road bill, but at a cost of almost half of MPO and all of SNO members leaving Diet session right in the middle of debating minor issues and compensations. Shouting and few threats even were heard all around the building. Members that exited session, claimed that second session is permanently over. Feeling of betrayal was predominant feature on obstructionist's faces along with anger. Session is truly over, but what to do now?"
ww1_bosnia.41.a: "A bit childish"

ww1_bosnia.42.t: "The Croatian Sabor dissolves"
ww1_bosnia.42.d: "The Ban of Croatia-Slavonia, Slavko Cuvaj, has dissolved the Croatian sabor soon after he was elected to power and he suspended the constitution, basically imposing direct rule. Opposition grew in the streets of Croatian cities and towns, and even in Bosnian towns, where a part of the population is and speaks Croatian. Soon joined non-Croat protestors in all out protest to Ban's actions."
ww1_bosnia.42.a: "Many such cases."

ww1_bosnia.43.t: "Student Demonstrations in Bosnia"
ww1_bosnia.43.d: "In response to the Ban of Croatia-Slavonia, under Budapest, dissolving the Croatian parliament and suspending the constitution, many demonstrations took place in Bosnia, where a large Croatian populace inhabits. It is unclear how long these demonstrations will last."
ww1_bosnia.43.a: "Are they done yet?"

ww1_bosnia.44.t: "The Muslim-Trialism Theory"
ww1_bosnia.44.d: "In northwest corner of Bosnia exists a rare almost homogenous groupation of Bosniak Muslims. These Muslims according to multiple historians are all indigenous converts. Croatian politicians like this interpretation, so much so, that even Ante Starčević called the area, 'Cvijet Hrvatske'; supporting claim that these people are kin of medieval Croats unlike in the most of the Croatian lands. By promoting this theory we will get overwhelming Croat support and possibilities of permanent Croat-Muslim partnership, be it political of everyday one. This might counter to Yugoslav ideas by sowing greater divide between Croats and Serbs, at the price of angering populace..."
ww1_bosnia.44.a: "Great, implement it now!"
ww1_bosnia.44.b: "Approach it slowly, this is playing with fire..."

ww1_bosnia.45.t: "Diet votes on the Language bill"
ww1_bosnia.45.d: "Bosnian Diet composed a new bill on usage of official language in condominium. For now just SNO signatures are behind it as a large campaign among representatives of the Diet is going on. Bill proposes Serbo-Croatian becomes one and only language in condominiums affairs, which isn't sitting well with non-elected 20 officials and 16 Croat members which demand for Croatian to become instead. Muslims, always adhering to neutrality might be deciding factor, if they mend relations with Serbs..."
ww1_bosnia.45.a: "Bound to fail..."
ww1_bosnia.45.b: "Croats cave in!" #still gets overruled, then language law focused gets bypassed but you get bigger stab debuff as Croats are agitated

ww1_bosnia.46.t: "Diet votes on the Language bill"
ww1_bosnia.46.d: "Last meeting about the language issue was met with fierce opinions on all sides. Eventually, the bill collapsed even before reaching Vienna. This time, the Croats are a bit more reasonable and it seems like the people of Bosnia and Herzegovina might be finally allowed to speak their own language, as the partial language bill passes."
ww1_bosnia.46.a: "Another pyrrhic victory."

ww1_bosnia.47.t: "The High-treason process of [GetYear]"
ww1_bosnia.47.d: ""
ww1_bosnia.47.a: ""

ww1_bosnia.48.t: "someone big dead in jail or sum else idk"
ww1_bosnia.48.d: ""#sidz note to self research trials
ww1_bosnia.48.a: ""

ww1_bosnia.49.t: "Railway Bill Passed!"
ww1_bosnia.49.d: "After tenious negotiations railway bill has been passed. Bill had again issues over language but in lesser extent than last time. Especially since this time, bill included practically no signs, just new railways and funding which is issue to noone. Parts of railways included in the bill are new line Srnetica-Jajce and improvement of Sarajevo-Bosanski Brod lines that connects condominiums capital to Slavonia and rest of the Empire."
ww1_bosnia.49.a: "Glad to hear!"

ww1_bosnia.50.t: "First Diet Session Collapses"
ww1_bosnia.50.d: "The First ever Bosnian Diet parliamentary session has collapsed due to internal conflicts in favor or against the Road Construction Bill."
ww1_bosnia.50.a: "Not good!"

ww1_bosnia.51.t: "Dealing with Bosnian Terrorism"
ww1_bosnia.51.d: "Exactly two weeks passed since governor general, Marijan Varešanin, was by some stroke of luck missed by five bullets. Event was completely unexpected. Žerajić, self proclaimed anarchist, according to sources, was in Sarajevo also week ago when Franz Joseph came to visit, but did not dare to kill the Emperor, although planned. Most media portrayed this event as action of a mentally unstable person. Žerajić's motive is possibly in Risto Radulović's article were author wrote about tragedies as necessary to temper the struggle of Bosnian Serbs. Frightening as it is, we cannot dwell too much on this event and must move media away from the topic, as it might be radicalizing factor needed for so many disloyal elements of this part of the Empire."
ww1_bosnia.51.a: "Horrifying!"

ww1_bosnia.52.t: "Bosnia Requests Bank Expansion"
ww1_bosnia.52.d: "The Bosnian Diet has demanded for the upgrade of their postal bank, likely with intent for more autonomy. It is true that Bosnian bankings is in shambles, but we cannot shower them with gifts, for they will be taken as granted. Should we accept, additional modernization will be given, but also more autonomy, with a bigger price tag. If denied, privately-owned foreign banks might alienate the area, but spare us administrative trouble."
ww1_bosnia.52.a: "Well, we have to help out"
ww1_bosnia.52.b: "Tighter leash is always a better choice"

ww1_bosnia.53.t: "Vienna accepts bank expansion"
ww1_bosnia.53.d: "Vienna has sent over their delegate to announce to us: they accept the Bosnian Postal Bank expansion, to help the country. Persuasiveness and almost begging from Bosnian diplomats bore fruit. A real progress for condominium's economy has been achieved and step towards proper modernization too."
ww1_bosnia.53.a: "I won't lie, this was unexpected"

ww1_bosnia.54.t: "Vienna refuses bank expansion"
ww1_bosnia.54.d: "In a foreseeable switch, Vienna has refused our request to expand our banking. Postal bank is going to be operated by central banks outside of condominium as previously agreed, without any care for people who use it and depend on it. Nobody is content with such announcement and wave of mistrust is incoming."
ww1_bosnia.54.a: "Time to bow our heads again"

ww1_bosnia.55.t: "Immediate closure of Bosnian Sabor"
ww1_bosnia.55.d1: "Following the tragic events in Sarajevo today, Vienna has ordered the closure and shutdown of the entirety of any current or future Bosnian Diet meeetings and discussions. Due to combination of general distrust, poor relations and instability which to a decent extent can be blamed on ourselves this might the effective end of all autonomy for condominium of Bosnia and Herzegovina.\n\nBalancing act was unsuccessfull and now as a consequence rest of the passable laws are locked. Well it was a good run."
ww1_bosnia.55.d2: "Following the Vienna's participation in the war, they are worried that many Serbs, who are also members of the Diet, sabotage their mission to achieve victory. They have suspended the Bosnian Diet on short notice, with nothing but a silent comment that this suspension might not be permanent..."
ww1_bosnia.55.a: "Not everyone is a Gavrlilo!" #good enough
ww1_bosnia.55.b: "A tragedy for democracy..."

ww1_bosnia.56.t: "Bosnia asks control of [760.GetName]" 
ww1_bosnia.56.d: "Bosnia has asked for the control of our occupied lands of [760.GetName], since [761.GetName] is already under their partial jurisdiction. Top military generals like Conrad von Hotzendorf and many Bosniak Muslims support this idea. Area was part of the Bosnia vilayet, which is technically the condominium's predecessor, but due to circumstances of the 1878 Austrian campaign to claim Bosnia and its annexation in 1908, it stayed part of Ottoman holdings in Balkan peninsula. Since area is inhabitated by Serbs and Bosniak Muslims, not much would change and question of area administration would be solved by itself."
ww1_bosnia.56.a: "Why not?"
ww1_bosnia.56.b: "They are fragile enough"

ww1_bosnia.57.t: "[FROM.GetName] transfers over occupied Serb lands"
ww1_bosnia.57.d: "Transfer has been accepted! Occasion is worthy of a celebration, but we cannot stall now. Some sort of integration of our societies is necessary no matter of their future position in the condominium, which has yet to be decided."
ww1_bosnia.57.a: "Update the maps, we've expanded!"

ww1_bosnia.58.t: "[FROM.GetName] refuses the transfer of Serb territory"
ww1_bosnia.58.d: "[FROM.GetName], currently occupying this land, refused to accept the transfer to its rightful controller. Unexpected to many, territories will not be reunited into former border of Bosnia Vilayet, a fond memory of Ottoman administration, to many in Sanjak and surrounding areas."
ww1_bosnia.58.a: "Well it was a bit ambitious..."

ww1_bosnia.59.t: "Vote on Land Redistribution"
ww1_bosnia.59.d: "We have finally introduced land reform to the conversation! After a good while, we have finally gathered the support to initially begin proposals on a land reform effort. The only stopgap would be Muslim opposition, but they will likely cave when offered concessions. It would be wise that we not go too fast, maybe, seeing that if we rush into this it could disturb the opposition and our coalition members alike."
ww1_bosnia.59.a: "Let's implement it quickly!"
ww1_bosnia.59.b: "Let's go slow..."
if_wait_year_BOS_TT_TT_I_LOVE_THIS_GAME: "If you wait a year, and the Diet goes without interruption, these effects will be applied:\n"

ww1_bosnia.60.t: "Diet Votes on the Land Redistribution Bill"
ww1_bosnia.60.d: "After lengthy discussions, progress on the land reform bill has finally emerged. Muslims Diet members finally caved  and agreed on the overarching proposal, after recieving some concessions of course. The reform will hopefully improve the land situation of the impoverished Croats and Serbs, and maybe make them hate us less."
ww1_bosnia.60.a: "Astounding."

ww1_bosnia.61.t: "Impending Land Reform Cancelled"
ww1_bosnia.61.d1: "When Austrian officials closed the diet, so did stop the proposed land reform. Vienna reccommends that we retrace our steps through the new channels, or give up the endeavour alltogether. Which one we choose matters not to them, that much we know."
ww1_bosnia.61.d2: "The proposed land reform has been halted as the Diet has closed due to Austrian entry into the war. Austrian officials issued the order upon the commencment of the invasion of Serbia. Some are more understanding of the closure, and trust the official reasoning that it is supposed to reduce ethnic tensions as a war goes on, though we have no real way to dispute the order either."
ww1_bosnia.61.a: "It is what it is"

ww1_bosnia.62.t: "First Diet Session Ends"
ww1_bosnia.62.d: "The First Diet Session ends with satisfactory results. Issues that the government failed to solve before the convening of the First Diet are being addressed and perhaps even handled, in due time. Opinions differ on quality of the meeting, but it largely ended on good terms between all participators. Additionally, a pertinent road infrastructure bill should be passed soon via official or unofficial channels, a result derived from the amiable collaboration between the different parties."
ww1_bosnia.62.a: "Pretty good, if you ask me"

ww1_bosnia.63.t: "Managing the Occupation of Taslica"
ww1_bosnia.63.d: "The Montenegrin part of Sanjak is now confined within the condominium's borders, althought only on a temporary basis as we have been informed. In the occupied area there is a large Bosniak Muslim minority, along with Montenegrin Serbs. Confusion around this occupation runs rampant, as it could change the makeup of the government. With just a little push it could too, as it was already once part of Ottoman 'Bosnia Vilayet' and could be incorporated into the condominium with little issue."
ww1_bosnia.63.a: "I don't mind expansion!"

ww1_bosnia.64.t: "The 'Scutari Crisis'"
ww1_bosnia.64.d: "Serbia and Montenegro are refusing to give up their Albanian-speaking lands to an independent Albanian state, as per Vienna's demands. Reacting furiously to the news is [BOS.GetLeader], who declares a state of emergency, suspends Serb cultural associations and suspends the Sabor due to Serbian belligerence."
ww1_bosnia.64.a: "Silence them"

ww1_bosnia.65.t: "Second Diet Session Scheduled to Happen"
ww1_bosnia.65.d: "The Second Diet Session has been scheduled for around 50 days from now. It is the time for Bosnian lawmakers to prepare what they'll propose to the assembly."
ww1_bosnia.65.a: "Let's not get our hopes up"

ww1_bosnia.66.t: "Third Diet Session Scheduled"
ww1_bosnia.66.d: "After the end of the previous session, the third Diet session is scheduled to take place. Next session we should tackle the language issue once and for all, since the lengthy debate over it has overlapped and overtaken time set aside for other pressing issues."
ww1_bosnia.66.a: "Something is happening."

ww1_bosnia.67.t: "Bosnia Sends us Manpower"
ww1_bosnia.67.d: "Most likely as an attempt to get on our good side, condominium has sent us through their governor general few thousand souls to serve our army. These have been recruited apart from existing quotas, as an 'extra'. Hopefully, this will be one of the signs of former troubles being solved and no more obstructions. Whether it is a sign or not, this manpower will certainly come in handy."
ww1_bosnia.67.a: "Maybe we could milk out few more battalions there!"

ww1_bosnia.68.t: "Bilinski defiant!"
ww1_bosnia.68.d: "The Joint Finance Minister of the Empire, Leon Bilinski, is adamant with his position on the language issue within the condominium. Among actions like threatening to withhold salaries, to fire and arrest opposition, and to shuttering the diet, he also threatened bring the governor-general into the situation, who is even more resolute on the issue. If [BOS.GetLeader] gets involved then the threats may be put into action, destroying all the progress made so far. This matters little to some diet members, though, who get more radical and radical by the day..."
ww1_bosnia.68.a: "This might end bad."

ww1_bosnia.69.t: "Serbian Outcry about Croat-Muslim Teachings"
ww1_bosnia.69.d: "The Serb portion of our population have been complaining about Muslim teachings in our schools, meant to cater to Croat and Bosnian muslims. The idea of state propaganda running  against Serbs is not a new one, or even  incorrect, but the idea of Muslim indoctrination is about as stupid of a complaint as one gets."
ww1_bosnia.69.a: "Ignore them."

ww1_bosnia.70.t: "Giving Second Chances"
ww1_bosnia.70.d: "The Serb minority in the condominium has always been the most oppositional and aggressive, despite their relatively small population portion. To preserve the adminstration of the condominium, though, the government is extending an olive branch to the leaders of the Serb community, with assent from Vienna. Hopefully relations can be repaired. If not, then the worst may come to pass..."
ww1_bosnia.70.a: "I am still skeptical..."

ww1_bosnia.71.t: "Potiorek's struggle"
ww1_bosnia.71.d: "Oskar Potiorek, old Czech guard, is the new governor general of the condominium. Fierce opponent of Conrad von Hotzendorf, mostly due to his delusional opinion that he should be the chief of the general staff. Since Conrad was fired recently and Schemua appointed, Potiorek cannot stop nagging, severing his ties with other generals even more. Any promotion is good promotion, so he immediately applied for current position, where he has actual power and possibly could gain important favors."
ww1_bosnia.71.a: "Not much we can do about him"

ww1_bosnia.72.t: "Diet Resignation Bill"
ww1_bosnia.72.d: "In light of the continuous boycotting and spontenous resignations in our legislature, oftentimes there are several empty seats that legally cannot be filled until the next election. A law has been passed to address this, where snap elections will be held to fill empty seats abandoned by opposition or government alike."
ww1_bosnia.72.a: "Just stop resigning..."

ww1_bosnia.73.t: "Restricting Lumber Law"
ww1_bosnia.73.d: "The Diet attempted their shot at resolving Bosnia's 'Forest Question.' Before the Austro-Hungarian occupation in 1878, forest management in Bosnia was governed by the Ottoman Forest Regulation of 1869. It made it require so that local officials had to investigate title deeds (tapus) and record them in registers. When the Austrians took over, they looked at Bosnian forests with dollar signs in their eyes: they could only imagine the profit that exploiting the young Bosnian wood would make them. They reclassified these lands as state property and criminalized the previously accepted methods. Ever since the Diet was elected, this issue unified both the Muslim and Serb party together. The Serbs support this as their peasants are literally becoming bankrupt. Meanwhile, Muslims support the Forest Law due to the peasants becoming bankrupt, which means that they can't be paid. The proposed bill has been described as a response to the Austrian colonization of Bosnia. It proposes a severe reduction in fines for breaking this law and the recognition of servitudes."
ww1_bosnia.73.a: "Protect the Forests!"

ww1_bosnia.74.t: "School Rework Bill"
ww1_bosnia.74.d: "School system is by some standards byzantine and perfect for creating dissent among student. Most of teachers are foreign born and lack sympathy for local population, they find subordinate to themselves. Although Bosnia and Herzegovina do not have enough educated people to fill teacher's positions, priority in employing locals should be implemented. Also since our changes in the language law, some restrictions should be lifted."
ww1_bosnia.74.a: "They better be thankful for this!"

ww1_bosnia.75.t: "Serb Word Scandal"
ww1_bosnia.75.d: "Due to [BOS.GetLeader]'s bans on every single Serb organization, some prideful member of Diet and affected newspapers have resigned from their post. Reason is honour and some not well thought oath to the suspended newspapers. Consequence of this childish play is 12 empty seats for serb minority, biggest number since Diet's opening. These 12 empty seats will not by inherited by other SNO members, like most thought due to recently passed resignation law which demands for election of seats if multiple members resign at once."
ww1_bosnia.75.a: "Pride is truly a sin"

ww1_bosnia.76.t: "Ban on German language Approved"
ww1_bosnia.76.d: "Surprisingly, Vienna has approved our ban on the use of German in our interal communications. We anticipated more resistance from the actual speakers of the language, but this is a welcome surprise."
ww1_bosnia.76.a: "Great!"
