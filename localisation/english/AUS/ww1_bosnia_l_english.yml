ww1_bosnia.78.t: "Our Occupation of Taslica"
ww1_bosnia.78.d: "During all the chaos of the Balkan War, Conrad von Hotzendorf has suggested using the surrounding chaos in order to snatch contested Ottoman-Montenegrin lands. This morning, our forces moved into the city with minimal opposition."
ww1_bosnia.78.a: "A heist of this level, even the Romanians are jealous!"

ww1_bosnia.79.t: "Ugar Treeworks"
ww1_bosnia.79.d: "After passing our treeworks regulations, a decent firm has approached ministry. Although we have no say in this matter, they have been polite enough to show us the proposal and ask if we have any valid objections. None were given so job starts immediately. Like it or not, but things like this are exactly what we need for better relations with Vienna."
ww1_bosnia.79.a: "Whatever"

ww1_bosnia.80.t: "Ugar Treeworks"
ww1_bosnia.80.d: "Finance ministry and Diet both accepted deal with Ugar treeworks, firm that will hopefully bring change to lumber industry. Concessions being a mess and locals protesting turned Bosnian forests from a perfect oportunity into a boring and tiring battle. But now with restrictions in place and registers being in somewhat of an acceptable state, money can finally flow."
ww1_bosnia.80.a: "Finally something from the Bosnians!"

ww1_bosnia.81.t: "Fourth Diet Session Scheduled"
ww1_bosnia.81.d: "Concensus has been reached and scheduling of fourth Diet session has finally been officiated. Situation might be slightly improving, but that doesn't matter if world is on the razor's edge. Especially here, where stability is fiction and peace is just an illusion."
ww1_bosnia.81.a: "It ain't that bad, right?"

ww1_bosnia.82.t: "Collapse of the Diet"
ww1_bosnia.82.d: "If this Diet represents the condominium, then bloodshed in between it's nationalities is unavoidable. Recently at the Diet session, Croat representatives obstructed the session because Serbs demanded future language law of condominium to be called Serbo-Croatian and not Croatian. Both Croat parties, on which Vienna always relies for law passage, have gone rouge over language question. Worst thing is that this proposition demanded removal of Hungarian and Austrian, on which all three nationalities agreed upon."
ww1_bosnia.82.a: "Is this spiraling out of control?"

ww1_bosnia.83.t: "The Diet Calls for an Investigation of Title Deeds"
ww1_bosnia.83.d: "Landowners in Bosnia are in panic as the Sabor called for an investigation to occur in the title deeds. Ottomans were not exactly caring towards their populace, especially these faraway lands. Investigation has been demanded by Serbs and some Croats for decades already, so pressure to fix this 'under the rug' problem is more than urgent."
#https://research.sabanciuniv.edu/id/eprint/8345/1/dursunselcuk.pdf nice keep the lit here

ww1_bosnia.84.t: "Inviting Franz Ferdinand to Sarajevo"
ww1_bosnia.84.d: "Potiorek has finally decided. By inviting heir to the throne, to inspect the local garrison and to visit distant parts of Empire he will rule, Potiorek will prove his competence and possibly even gain some respect in eyes of the next Emperor. Plan seems perfect for him, except that tensions in the area are too big for such a high profile event. Ferdinand, who is not a big fan of such parades, would never consider accepting the invitation if it weren't for Potiorek extending the invitation to Sophie, Duchess of Hohenberg, Franz Ferdinand's wife, which is rarely invited to anything."
ww1_bosnia.84.a: "His Imperial and Royal Highness? Here?"

ww1_bosnia.85.t: "Fourth Diet Session Cancelled"
ww1_bosnia.85.d: "Due to instability reasons, Vienna has suspended all Bosnian Sabor activities. sidz"
ww1_bosnia.85.a: "Hooray."