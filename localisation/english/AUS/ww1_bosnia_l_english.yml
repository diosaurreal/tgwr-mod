BOS_regional_schools: "Continue School Reform"
BOS_total_reelection: "A Proper Re-election"
BOS_preparing_stage: "Setting the stage"
BOS_tipping_the_scale: "Tipping the Scale"
BOS_pat_on_the_back: "A Pat on the Back"
BOS_trialism: "Found a Trialism Faction"
BOS_multiethnic: "Successful Multi-Ethnic Project"
BOS_martial_law: "Declare Martial Law"
BOS_trials: "Trials for Disloyal Elements"
BOS_police_state: "Under the Watchful Eye"

BOS_the_show_goes_on_desc: "Somehow We Meet Again. A lot has happened since abrupt end of last session. Thankfully, stable majority from last session still stands firm and united. Finance ministry asked for renewal of Diet session for which we will be greatful. Horrors of war and split of Serbian vote between pro-Austrian reconciliatory side and hostile opposition offers more breathing space for problematic political alliances. Hopefully this session brings real change."
BOS_politics_desc: "We are back alive and kicking! To ensure our political existance we must reach beyond condominium's borders. To gain this outreach we must consolidate what still hasn't been in Diet and push wherever we can."
BOS_foreignstuff_desc: "Nobody knows how much more time we have before finance ministry or governor general find some reason to close the session, so we must be as active as possible. Contacting politicians with similar causes outside of condominium should be a new goal and establishing our presence on political map of Austro-Hungarian Empire, no matter how comical such sentence might sound. Some sort of balancing act between both halves of Empire would be useful too..."
BOS_school_rework_desc: "Few issues caught our attention recently: disproportianate ratio of foreign born teachers to 'our own', improper literature, old schools and cold and overly strict approach to education. All certainly will not be solved so fast, but Diet will give it's best."
BOS_offer_manpower_desc: "Governor general [BOS.GetLeader] recently realised, that if he were to sent some Bosnian manpower to K.u.K., relations between condominium and Vienna would certainly improve and of course his own image in face of other officials. So his mind has been made up for a long time and it seems it is about time to enforce this idea. Diet will accept this, with goal to improve strained relations with its governor general."
BOS_offer_forest_concesions_desc: "Forestry is becoming big employer in condominium and through some rumours, Diet is aware that Austria is planning to invest further into that sector of economy. To reap bigger investments, Diet is currently discussing a bill, by which it plans to offer more support to Empire's companies interested in Bosnian forests. It is a heated topic, but everyone agrees that such bill would greatly improve our strained relations with Vienna."
BOS_village_patrols_desc: "Young Bosnia, Black Hand, part of SNO and who knows how many civilians are currently undermining our rule in these lands! Much of the activites rely on weak border controls for which Vienna has already given few solutions. Yet, we cannot be certain and addition of village patrols in the certain areas would help a lot. We will send this proposition to Vienna and organize most of it no matter the response."
BOS_regional_schools_desc: "Another necessary step in improvement of education system is construction of more regional schools. Regional schools, although covering only first few years of education, are enough to significantly improve literacy rates. Through time, these regional schools will become proper schools and simply put, be a gift that keeps on giving."
BOS_total_reelection_desc: "A lot of time has passed since last elections, if not counting partial election between third and fourth Diet session. Curia system will still be intact and due to fact that SNO party has not been performing well lately, Vienna has approved these elections, what was not expected to say the least. Preparations for this elections are modest like for the last one, since political composition of condominium is generally following ethnic lines with minor deviations."
BOS_preparing_stage_desc: "sidz note to self"
BOS_tipping_the_scale_desc: "Last elections has been sort of a disaster and many are not that confident in the outcome of these elections. Vienna has offered help in rigging elections and we might as well except it if overlords have green-lighted it. What is most important is that opposition does not entertain similar ideas..."
BOS_pat_on_the_back_desc: "It would be an understatement that Diet has been performing well. Situation is not perfect and never will be, but impression has been imposed upon Emperor and ministry. Some rumours say that a pat on the back along with trust and additional investments might be offered soon to our humble Diet."
BOS_trialism_desc: "sidz note to self"
BOS_multiethnic_desc: "sidz note to self"
BOS_martial_law_desc: "sidz note to self"
BOS_trials_desc: "sidz note to self"
BOS_police_state_desc: "sidz note to self"

BOS_investigate_tuzla_saltworks: "Investigate Tuzla Saltworks"
BOS_investigate_tuzla_saltworks_desc: "The Tuzla Saltworks have been on a lease for more than a decade. Ancient salt mines in the area are a decent part of the local economy but the Serbs around the area are raising suspicions about the firm breaking their contractual obligations. Most of the officials do not really care about such things, so the Diet is thinking about writing few letters to those involved and begin a minor investigation on its own."
BOS_vienna_restrict_lumber: "Demand Forestry Laws"
BOS_vienna_restrict_lumber_desc: "Bosnia's forests are a primordial and untapped source of income for Viennese pockets. Forest, almost untouched by Ottoman rule, is pristine and unique location for growth of lumber industry. Hungarian and Austrian companies are already scheming to profit out of it. This situation calls for immediate demand for protectionist laws so these industries don't abuse the area more than allowed. Serbs are demanding for such restrictions for years and will be certainly happy to hear such proposal."
BOS_crackdown_serb_media: "Silent Opposition's Voices"
BOS_crackdown_serb_media_desc: "The opposition has been real loud in all form of media ever since this darned conflict began in the region. To prevent any radicalization and other subversive measures propagated by Serbian demagogues, governor general [BOS.GetLeader] is planning to imposed bans, fines and arrests to force peace in already unstable condominium. Many people are said not to like the censorship."
BOS_crush_serb_media: "Crush Serb Media"
BOS_crush_serb_media_desc: "Not just that Balkan League emerged victorious, but they neglect the peace treaty too! The Skadar crisis, as people in the region call, was the final nail in the coffin of [BOS.GetLeader]'s patience. Immediate closure of all Serb media is a radical, but an effective measure, since a liar's greatest power is it's tongue."
BOS_chaos_in_sarajevo: "Chaos in Sarajevo"
BOS_chaos_in_sarajevo_desc: "Vienna has ordered the closure of the Bosnian Diet following recent events that caused much instability in the Empire. Waging war is hard enough on its own, so Diet has to be closed. Whether decision is permanent or temporary, it is yet to be seen."
BOS_ask_for_sanjak: "Reclaiming the Vilayet"
BOS_integrate_sanjak: "Integration of Sanjak"
BOS_taslica_occupation: "Unexpected Expansion"
#note to self sidz foc loc desc all three

set_1913_election_BOS_effects: "Removes 8 members in the SNO and adds 8 members in the SNP"
BOS_ugar_treeworks: "Ugar Treeworks"
BOS_ugar_treeworks_desc: "After debates about protectionism of Bosnian forests and all topics connected, a company that meets criteria even of the most hardline members of the Diet, has appeared with a deal. Company seems reasonable and reliable, but still Diet has to be informed and joint finance ministry in Vienna needs to approve and sign all paperwork."
BOS_fragile_peace_shattered: "The Fragile Peace"
BOS_fragile_peace_shattered_desc: "Due to recent unimaginable event, our officials have been overwhelmed with its' fallout. Actions need to be taken along with an expansion of police force and other defenders of condominium's fragile stability. Investigation is still ongoing..."
#An attempt on governor general's life has happened. Event had significant outreach and yet unknown consequences; an unrepeatble occurence or a cold foreshadowing? Either way, more attention will be given to prevention and finding potential causes of such dangers. (text for a later event)



