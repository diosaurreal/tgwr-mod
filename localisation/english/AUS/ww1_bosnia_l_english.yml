BOS_POWDERKEG_DESC: "During the Congress of Berlin in 1878, Austria-Hungary was allowed to occupy Bosnia Vilayet, which remained officially part of Ottoman Empire until 1908 annexation crisis. Today area is known as Condominium of Bosnia and Herzegovina, jointly ruled by both Empire's halves. \nEver since the 1878 occupation, these lands were treated as a far away colony. Croats, Serbs and Bosniak Muslims are the three uncooperative nationalities, of which none forms a majority. Each with a different set of ideas for lands future, wreak havoc as they drain Empire's energy..."
