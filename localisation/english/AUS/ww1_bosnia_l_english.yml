BOS_POWDERKEG_DESC: "In 1878, the Congress of Berlin allowed Austria-Hungary to occupy the the Bosnia Vilayet and was annexed by the Habsburgs in 1908 as the Condominium of Bosnia and Herzegovina, and is jointly ruled by both Cisleithania and Transleithania.\nTreated as a far-away colony ever since the 1878 occupation, the lands of Bosnia have been neglected by Vienna, and thus their inhabitants resent Austrian rule. Croats, Serbs and Bosniak Muslims make up the realm, each opposed to each other, but more broadly opposed to Austria itself. Additionally, nationalist groups belonging to each ethnicity test the administrative prowess of Austria-Hungary, terrorising the countryside and provoking violence in the cities..."
