#House of Commons
ENG_house_of_commons_cat: "The House of Commons"
ENG_house_of_commons_cat_desc: "The public of the United Kingdom of Great Britain and Ireland elects [?total_parliment_seats] Members of Parliament, or MPs, to represent their interests and concerns in the House of Commons. MPs consider and propose new laws, and can scrutinise government policies by asking ministers questions about current issues either in the Commons Chamber or in Committees. The ruling party must ensure they are supported by the majority of seats in parliment though coalitions or swaying individual MPs, if the government is unable to pass bills the king may intervene to dissolve parliment, the ruling party may choose to hold new general elections themselves, or they may even let the opposition party attempt to form a minority government.\n\nThe type of government in power will change how you should analyse the support of MPs and the status of coalitions. A Coalition government is a government built on a political party between, usually two, parties. If the coalition breaks up and the ruling party or remaing coaltion controll less then half the seats, the government will begin to fall. A minority government is a government led by a party who can't form a steady coaltion with another political party and instead relies on the 'goodwill' of individual MPs. This type of goverment must keep the support in parliment above the majority too but won't have a coalition to rely on - they must rely on the support they can gather among individuals.\n\n[?ENG_conservative_supporters]/[?ENG_total_conservative_seats] Conservative MPs [ENG_conservative_party_position] [ENG_conservative_party_status]\n[?ENG_liberal_supporters]/[?ENG_total_liberal_seats] Liberal MPs [ENG_liberal_party_position] [ENG_liberal_party_status]\n[?ENG_ai_supporters]/[?ENG_total_ai_seats] All-for-Ireland MPs [ENG_ai_party_position] [ENG_ai_party_status]\n[?ENG_ip_supporters]/[?ENG_total_ip_seats] Irish Parliamentray MPs [ENG_ip_party_position] [ENG_ip_party_status]\n[?ENG_labour_supporters]/[?ENG_total_labour_seats] Labour MPs [ENG_labour_party_position] [ENG_labour_party_status]\n\n[?ENG_ind_supporters]/[?ENG_total_ind_seats] Independent MPs [ENG_ind_party_position]"

