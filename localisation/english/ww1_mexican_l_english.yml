### EVENTS ###
ww1_mexico.11.t:0 "Porfirio Díaz Wins Re-Election!"
ww1_mexico.11.d:0 "The results of the general elections have been released, in which President Porfirio Díaz sought his seventh term in office. Despite earlier statements suggesting he would not run and that Mexico was ready for democracy, Díaz reversed his position, leading to widespread discontent. His primary opponent, Francisco I. Madero, a proponent of democratic reforms, was arrested during the campaign, effectively removing significant opposition. The election results overwhelmingly favored Díaz, with official counts granting him 98.93% of the vote, while Madero received a mere 1.04%...\n\nThose who have democratic sympathies have called the election rigged, causing some members of Diaz's government to nervoulsy expect protests or even armed rebellions in response..."
ww1_mexico.11.a:0 "Clearly Rigged!"
ww1_mexico.11.a.tt:0 "§YYou'll Lead the Revolution!§!"
ww1_mexico.11.b:0 "Fair and Square!"
ww1_mexico.11.b.tt:0 "§YYou'll Stay Loyal to the Government!§!"

ww1_mexico.12.t:0 "The Arresting of Madero!"
ww1_mexico.12.d:0 "Francisco I. Madero is the leader of a group called the Anti-Electionists, who are campaigning against Porfirio Díaz and labeling him as some kind of totalitarian tyrranical dictator! With Madero and his followers gaining popularity the election that's supposed to be a Diaz sweep is starting to look contested.... The only obvious choice is to arrest Madero and five thousand of his blinded followers!"
ww1_mexico.12.a:0 "Arrest These Men!"

ww1_mexico.13.t:0 "Madero Horsing About..."
ww1_mexico.13.d:0 "Francisco I. Madero, who has recently been arrested so he doesn't tamper with the Elections, has recently been released on bail and allowed to ride on a horse around San Luis Potosí during the day, due to his father's influence on the State Govenor."
ww1_mexico.13.a:0 "We'll watch him like a hawk"

ww1_mexico.14.t:0 "Francisco I. Madero Escapes!"
ww1_mexico.14.d:0 "Francisco I. Madero, the notorious leader of the re-election party was recently plased under house arrest, but was allowed to ride a horse around town during the day. Madero succsesfully evaded his gaurds and has galloped away into the dessert... Most likely to seek reguge in the US..."
ww1_mexico.14.a:0 "A Mexican Hero!"
ww1_mexico.14.b:0 "The Coward Flees..."

ww1_mexico.15.t:0 "Plan de San Luis"
ww1_mexico.15.d:0 "To spark the flame of change for Mexico, a manifest has been written naming Madero as the Provisional President of Mexico...\n\nThough being written in San Antonio, Texas, the document is being dated October 5th and declared that it was written in San Luis Potosí, to appeal to the Mexican people and to avoid conflict with the U.S Government. under the slogan 'Effective Suffrage, No Re-election',The Mexican people are being called to take up arms on Sunday, November 20, at 6 P.M. The plan for an uprising in arms for the culmination of the dictatorship of Porfirio Díaz and to establish free and democratic elections.\n\n. Madero has also promises to respect the governmental obligations contracted before the revolution, to be scrupulous with the use of public funds...\n\nBy promising to return the land to the people and natives we would gain a large amount of support from the peasants, but are we to promise things we can't assure?"
ww1_mexico.15.a:0 "Promise the redistribution of land to the people!"
ww1_mexico.15.b:0 "Let's not get radical"

ww1_mexico.16.t:0 "The Beggining of the Revolution!"
ww1_mexico.16.d:0 "The Plan de San Luis has spread across all of Mexico, calling for the end of Diaz's personalistic dictatorship and the release of political prisioners and the return of land to the poor! As the plan dictated, it's Sunday, November 20th, the time for revolution has struck us! Madero arrived at the border and planned to meet up with 400 men raised by his uncle Catarino Benavides Hernández to launch an attack on Ciudad Porfirio Díaz; however his uncle only brought ten men.... delaying the main force of the revolution. On the bright side some commoners have began to rise up to mediocre results, and other rebel leaders such as Pascual Orozco, Pancho Villa, Emiliano Zapata, and Venustiano Carranza have become attracted to the revolution, but not especially loyal to Madero"
ww1_mexico.16.a:0 "A Slight setback..."

ww1_mexico.17.t:0 "Successful Shipment of Arms & Munitions to Northern Mexico"
ww1_mexico.17.d:0 "Our dear friend, Sherburne Hopkins has used his influence on the U.S Secretary of State Philander Knox, to allow munitions to pass unchallenged from El Paso to Ciudad Juárez to aid revolutionaries, with some arms even coming straight from New York City!"
ww1_mexico.17.a:0 "Great News!"

ww1_mexico.18.t:0 "¿El Plan de San Luis?"
ww1_mexico.18.d:0 "The peasants and commoners have gathered in the streets, some armed, in an act of protest of President Diaz's rightful re-election! They are calling this a revolution!? As it turns out this was organized by the well known criminal who acts like a democratic hero, Francisco I. Madero... The Plan de San Luis was formulated by him and other rebels while he was hiding in Texas, but he's acting as if he wrote it on October 5th, while still imprisoned in  San Luis Potosí. Francisco I. Madero has also claimed himself as the quote on quote provisional president. In the northern frontier rebel groups have already become organized, we must dispatch the Federales at once!"
ww1_mexico.18.a:0 "Who do these peasants think they are?"

ww1_mexico.19.t:0 "A Massacre in Puebela"
ww1_mexico.19.d:0 "As the Plan de San Luis spreads across the country, causing peasants to come under the false conclusion that Diaz's government has failed. In Puebela, a city just south east of Mexico City, a plot against President Diaz was discovered, which was being headed by Aquiles Serdán, and the officers pre-emptively, possibly rightfully, killed him and his family. Rebels across our country have wrongfully painted this as some sort of tyrranical massacre!"
ww1_mexico.19.a:0 "Their death will not be in vain!"
ww1_mexico.19.b:0 "A Necessary Measure"





