ITA_unity_through_nationalism: "Defender of Traditional Values"
ITA_unity_through_nationalism_desc: "Giolitti, while a very respectable man who did his best, was a bit too open to social reforms from the left. We must protect conservative values and prevent the erosion of what makes our country great."
