ITA_psi_balance_desc: "While on the surface a united fro- actually, forget that. Everyone knows the All-Left coalition is a deeply divided coalition, it's not exactly a secret. With the All-Left Coalition having formed it's own government, mantaining relations with coalition partners will be essential if we wish to have a functioning government, meaning concessions to different factions will have to be made.\n\nWe currently have support from ¬ßC[?ITA_total_government_supportss]¬ß!/¬ßY508¬ß! of parliament, with ¬ßC254¬ß! being needed to avoid a ¬ßRGovernment Collapse¬ß!. If our government collapses, new elections will immediately be held. Depending on the result of the elections, we may either be able to form a new government, or we will be ousted from power for good.\n\nThe ¬ßQMaximalists¬ß! currently control ¬ßY79¬ß! seats in parliament. Our relationship with them can currently be described as [ITA_maximalist_relationship_tt]\n¬ßLThe Maximalists are the most far left political group in Italy. They believe in a violent revolution and have little love for any form of electoral democracy that includes any right wing parties. They strongly support increased state control over the economy, as well as actions that help reduce the power of the right wing.¬ß!\nThe ¬ßrLabourists¬ß! currently control ¬ßY12¬ß! seats in parliament. Our relationship with them can be described as [ITA_labourist_relationship_tt]\n¬ßLThe Labourists made up of trade unions and anarchists. They believe in a form of localized socialism supporting empowering unions as well as the creation of local communes. Although firmly socialists, some radical state socialism policies may anger them¬ß!\nThe ¬ßtReformist Socialists¬ß! currently control ¬ßY45¬ß! seats in parliament. Our relationship with them can be described as [ITA_reformist_relationship_tt]\n¬ßLReformist socialists are made up of traditional socialists who favor reform through democracy instead of a violent revolution. They are quite easy to please with generic socialist policy, although too much authoritarianism will anger them¬ß!\nThe ¬ßlRepublicans¬ß! currently control ¬ßY11¬ß! seats in parliament. Our relationship with them can be described as [ITA_republicans_relationship_tt]\n¬ßLItalian Republicans are generally quite similar to reformist socialists. As the name suggests, they strongly believe in the creation of an Italian Republic. Outside of the monarchy issue, they are self described socialists generally supporting all socialist policies. The difference between them and reformist socialists, however, is that Republicans generally tick slightly right on social issues as well as a few economic issues.¬ß!\nThe ¬ß9Radicals¬ß! currently control ¬ßY90¬ß! seats in parliament. Our relationship with them can be described as [ITA_radicals_relationship_tt]\n¬ßLThe Radical Party represents firmly the middle left of Italian politics. They are generally quite progressive on many economic issues, supporting strong welfare states and a more equal economy. However, they are usually made uncomfortable by collectivist policies. On social issues, they are generally in alignment with socialist parties, although their views on the monarchy being a significant difference.¬ß!\nThe ¬ß7Progressive Left¬ß! currently control ¬ßY29¬ß! seats in parliament. Our relationship with them can be described as [ITA_progressive_relationship_tt]\n¬ßLThe Progressive Left is made up of the most left wing of the centrist PM's. They are similar to the Radical Party on Economic issues, supporting a strong welfare state. Their difference with the radicals, however, is that they are firmly center left on social issues. Any talk about a Republic with them can be forgotten, and they are generally uncomfortable with reforms involving things like divorce.¬ß!\nThe ¬ß6Liberals¬ß! currently control ¬ßY109¬ß! seats in parliament. Our relationship with them can be described as [ITA_liberals_relationship_tt]\n¬ßLThe Liberals are made up of the center left and center right of Italian politics. They supporting limited economic and social reforms, but stand strongly opposed to any radical remakings of the system. Many of them are explicitly anti socialist, but it may be possible to find limited areas of common ground with them.¬ß!\nThe ¬ß2Catholics¬ß! currently control ¬ßY51¬ß! seats in parliament. Our relationship with them can be described as [ITA_catholics_relationship_tt]\n¬ßLThe Catholics are made up of a range of right wing MP's. Generally not a fan of economic reforms as well as staunchly opposed to social reforms, finding any place of cooperation with them may be impossible.¬ß!\nThe ¬ßqNationalists¬ß! currently control ¬ßY63¬ß! seats in parliament. Our relationship with them can be described as [ITA_nationalists_relationship_tt]\n¬ßLThe Nationalists believe in Italian expansionism and staunch social consercative. They are our staunch enemy in parliament, and with them decrying us as national traitors, any form of cooperation with them can be forgotten. While somewhat mixed on the extent to overhual the economy, all of them oppose the reforms we wish to implement.¬ß!"
