ITA_hand_made_weapons_desc: ""
ITA_rebuilding_the_nation_idea: "Rebuilding The Nation"
ITA_socialist_crackdown: "Crackdown on the Socialists"
ITA_socialist_crackdown_desc: "The Socialist Movement since the start of the Great War has expressed fierce opposition to our involvement in the conflict. Such voices to sabotages our war effort should not be tolerated. Cracking down these agitators is necessary for the stability of the nation."
ITA_pacifist_crackdown: "Crush the Pacifists"
ITA_pacifist_crackdown_desc: "The Pacifist know nothing about the truth, we are fighting for the glory of Italia and a greater purpose. Nothing that these capitulationist would ever understand. We must crackdown on pacifism in order to continue our war effort and to rally the nation around victory and duty."
ITA_principles_of_rigidity: "Principles of Rigidity"
ITA_principles_of_rigidity_desc: "The Italian People should be aware of the Principles of Rigidity. That we are strong, determined and undaunted by any threats to Italy. The Italian Spirit should therefore follow the principles of rigidity, that order and cohesion should be the utter most importance for the nation to move foward! "
ITA_duty_to_victory: "Duty to Victory"
ITA_duty_to_victory_desc: "We must instill every Italian with a sense for duty. A duty to victory, all sacrifices are means to a victorious end. It shouldn't matter how we get there. What only matters is that we will get there and what Italy as a whole gains."
ITA_duty_to_victory_tt: "Modify ¬ßY[ITA_army_name_thing]¬ß! by\n¬£GFX_breakthrough_texticon Breakthrough: ¬ßG+10.00%¬ß!\n¬£GFX_organization_gain_texticon Army Organization Regain: ¬ßR-5.00%¬ß!"
ITA_the_invisible_weakness: "The Invisible Weakness"
ITA_the_invisible_weakness_desc: "The nation is not truely united until all weaknesses of the Italian people and nation is to be eliminated. Disobedience and agitation serves nothing more to harm the country. We must swiftly remove the blight of our country like a suregon. So that Italy remains strong and united!"
ITA_idea_the_invisible_weakness: "The Invisible Weakness"
ITA_idea_the_invisible_weakness_desc: "Our soldiers must understand the importance of serving Italy. Weaknesses both real and imaginary should be eliminated from the thoughts of the people and our army. It is not just a war but a duty that every Italian must hold to their hearts. We shall show no weakness to our foes!"
ITA_international_volunteers: "International Volunteers"
ITA_anti_socialism: "Crackdown on Socialism"
ITA_moderate_the_nationalists: "The New Program"
ITA_moderate_the_nationalists_desc: ""
ITA_bulwark_of_the_conservative_movement: "Align With Salandra's Men"
ITA_bulwark_of_the_conservative_movement_desc: ""
ITA_national_pacification: "Seek National Pacification "
ITA_national_pacification_desc: ""
ITA_arrest_liberals: "Crackdown on Protesting Liberals"
ITA_pass_the_first_anti_dissent_laws: "Pass the First Anti-Dissent Laws"
ITA_pact_with_the_mafia: "Pact With The Mafia"
ITA_from_the_root: "Rip Out The Root"
ITA_split_the_socialist_movement: "Split The Socialist Movement"
ITA_split_the_socialist_movement_desc: "Many of Giolittis previous reforms have satisified the hunger of many working men for change up north. We can utilize this to try and split the socialist movement by integrating some of the more moderate socialists into the political system while isolating and attacking the maximalists."
ITA_repress_the_north: "Repress the Northern Anarchists"
ITA_repress_the_north_desc: ""
ITA_adapt_to_mountain_warfare: "Adapt to Mountain Warfare"
ITA_adapt_to_mountain_warfare_desc: "With the outbreak of war in the Alps, our army must employ new strategies to fight effectively in this high-altitude, dangerous combat through valleys and the peaks of snow-capped mountains, where an avalanche fall down and take out an entire brigade at any moment. This new warfare demands tunneling through glaciers, scaling cliffs, and hauling supplies up mountains by rope."
ITA_establish_supremacy_over_politicians: "Establish Supremacy Over Politicians"
ITA_expand_carabinieri_des: "Deploy the Carabinieri to Frontlines"
ITA_expand_carabinieri_des_desc: "There are many soldiers in our army who are too cowardly to advance and when on the attack desert from their position and run away from the front. This is completely unacceptable, so we should deploy the Carabinieri to the front line with machine gun posts to prevent any of our soldiers from retreating."
ITA_align_with_ultra_nationalists: "Align With Ultra Nationalists"
ITA_stick_to_our_core_values: "Shatter the Status Quo"
ITA_stick_to_our_core_values_desc: ""
ITA_concentrate_offensives: "Launch Concentrated Offensives"
ITA_concentrate_offensives_desc: "If we are to make any progress in this hellish trench warfare, we must concentrate our forces into one location and launch a large, coordinated offensive. It may be demanding of our supply networks, but there is no other way for us to make reasonable gains without a mass of artillery bombardment, with men charging forward and making rapid gains."
ITA_offensive: "Italian Offensive"
ITA_veneto_offensive: "Veneto Counter-Offensive"
ITA_isonzo_offensive: "Isonzo Offensive"
ITA_nice_offensive: "Nice Offensive"
ITA_improve_soldier_morale: "Boost Soldier Morale"
ITA_improve_soldier_morale_desc: "The morale of our soldiers at the frontline is deteriorating due to the terrible conditions in the trenches at the frontlines. We must improve the morale of our soldiers by ordering our commanders to improve the living conditions at the frontline."
ITA_sack_cadorna: "Sack Cadorna"
ITA_sack_cadorna_desc: "Cadorna has proven himself to be an incompetent commander who cannot lead the army. His ruthless strategies have cost us a lot of lives and equipment and have greatly damaged our war effort. He will be relieved from command and replaced with Armando Diaz."
ITA_an_army_of_trust: "Cultivate an Army of Trust"
ITA_an_army_of_trust_desc: ""
ITA_hearten_morale: "Hearten Morale"
ITA_hearten_morale_desc: ""
ITA_update_tactical_norms: "Update Tactical Handbooks"
ITA_update_tactical_norms_desc: ""
ITA_form_compagnie_della_morte: "Form the Compagnie della Morte"
ITA_form_compagnie_della_morte_desc: "In this war there are many defensive fortifications, making any offensive extremly costly and ineffective. We should form specialised engineers of the most experienced soldiers 'Companies of Death' to go to the enemy lines and destroy fortifications before our main army advances, to reduce the enemies defensive capabilities."
ITA_mass_produce_artillery: "Mass Produce Artillery"
ITA_mass_produce_artillery_desc: "Artillery is extremely important for this war, with mass bombardments needed to make any offensive. We neeed to mass produce artillery so we can launch large offensives and to make sure we never have a shortage."
ITA_mass_produce_artillery.tt: "Modify ¬ßY[ITA_army_name_thing]¬ß! by\n$MODIFIERS_ARMY_ARTILLERY_ATTACK_FACTOR$ ¬ßG+10.00%¬ß!\n"
ITA_storm_troopers: "Establish the Arditi"
ITA_storm_troopers_desc: "To make any effective assault on the enemy position, we need to have the most devoted, brave and experienced men to charge forward and fight for the enemy positions. We should create specialized 'Arditi' units for this purpose, made of men who are willing to give their life to the country.\n"We either win, or we all die!""
ITA_unlock_stormtroopers: "Enables ¬ßYStormtroopers Section¬ß!"
ITA_arditi_tech: "Stormtroopers"
ITA_boys_of_99: "Boys of 99"
ITA_boys_of_99_desc: "Manpower is vital for maintaining strong positions at the frontline and ensuring the enemy never gets through. With the war dragging on, more manpower is needed and to fulfill this we should hasten the training of new recruits as soon as they turn 18 and rush them onto the frontlines."
ITA_hold_the_piave: "Hold the Piave"
ITA_hold_the_piave_desc: "The Austrians have just pushed our armies all the way to the Piave river, and major cities such as Venice are in immediate danger of the Austrians. The Piave river must not fall, and we must defend it with everything we have, not letting a single Austrian soldier cross."
ITA_stand_on_the_piave: "Stand on the Piave"
ITA_veneto_counteroffensive: "Veneto Counter-Offensive"
ITA_veneto_counteroffensive_desc: "The Austrians armies are weak after their offensive against us, and there are Italians in Veneto who are waiting for our armies to come and liberate them. We must launch a counter-offensive with all our strength and make a decisive blow against the Austrian army while liberating the whole region."
ITA_accelerate_training_of_officers: "Accelerate Training Of New Officers"
ITA_accelerate_training_of_officers_desc: "Our army needs many new officers to effectively command the many units in our army, which are lacking officers. We should accelerate the training process of new officers to help combat the shortage."
ITA_constant_offensive: "Relentless Assaults"
ITA_constant_offensive_desc: "Luigi Cadorna believes that if the army keeps a constant attack on the enemy positions, the enemy will be completely demoralized and can be beaten by the superior morale of our armies. We should implement this tactic, and never allow the enemy to have a chance to recover."

ITA_continue_moderation_of_the_party: "Continue Moderation of the Party"
ITA_continue_moderation_of_the_party_desc: ""
ITA_land_reform_south: "Southern Land Reform"
ITA_land_reform_south_desc: ""
ITA_divorce_reform_r: "Reform the Divorce System"
ITA_divorce_reform_r_desc: ""
ITA_progressive_catholics: "Align with Progressive Catholics"
ITA_progressive_catholics_desc: ""
ITA_social_equality_women: "Social Equality of Women"
ITA_social_equality_women_desc: "Women currently don't have a large role in society in Italy, with only a small portion of the workforce consisting of women. We must encourage more women to partake in the workforce and shatter traditional roles." 

ITA_develop_housing_in_toscana: "Develop Housing in Toscana"
ITA_build_modern_homes_in_the_south: "Build Modern Homes in the South"
ITA_build_modern_homes_in_the_south_desc: "The state of housing in the south is very poor, with many people living in homes made of rock that arent even reinforced by mortar or wood. As part of our state housing plan, we must build new modern houses in the south to provide the people there proper, liveable housing."
ITA_build_modern_homes_in_the_south.tt: "Modify ¬ßYThe Southern Question¬ß! by\n$MODIFIER_GLOBAL_MONTHLY_POPULATION$: ¬ßG+10.0%¬ß!\nModify ¬ßYSocial Unrest¬ß! by\n$MODIFIER_STABILITY_FACTOR$: ¬ßG+5.00%¬ß!"

ITA_annul_the_pro_anarchist_laws: "Ban Left Wing Newspapers"
ITA_annul_the_pro_anarchist_laws_desc: "" 
ITA_begin_army_reforms_desc: "The Italian army is in a pitiful state. Under equipped, outdated, and being lead by some of the most incompetent men the world has to offer have resulted in an army that is in no state to pick a fight with any major country. We will need massive reforms in leadership and tactics as well as an increase in funding to drag our army out of it's current miserable conditions."
ITA_southern_agriculture: "The Southern Question"
ITA_southern_agriculture_desc: "Southern Italy has fallen heavily behind the industrialized north due to decades of government neglect. Goverments of the past have neglected the south's economic and social concerns to prioritize the growth of the north, reflected in Italy's high tariffs and little investment in southern infrastructure. While the souths exploitation provides benefits to our industry up north, it's lead to mass emigration, particularly to America."
ITA_southern_question_idea: "The Southern Question"
ITA_southern_question_idea_desc: "Southern Italy has fallen heavily behind the industrialized north due to decades of government neglect. Goverments of the past have neglected the south's economic and social concerns to prioritize the growth of the north, reflected in Italy's high tariffs and little investment in southern infrastructure. While the souths exploitation provides benefits to our industry up north, it's lead to mass emigration, particularly to America."
