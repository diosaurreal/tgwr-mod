ITA_formazioni_di_difesa_proletaria_dec: "Formazioni Di Difesa Proletaria"
ITA_formazioni_di_difesa_proletaria_dec_desc: "With the Nationalist traitors actively threatening our security, we've decided to form our own paramilitary as a way to defend the country and our people. The Formazioni Di Defesa Proletaria is expected to counter the ultra-nationalists on the ground, and stop their violence and intimidation of our country. Of course, our paramilitary won't be able to stop much of anything if it's too weak. Strengthing our paramilitary will expand its capabilities, but having a paramilitary too strong will definitely alarm centrists in the country, which may lead to its own political consequences.\n\nThe current strength of the ¬ßCFormazioni Di Defesa Proletaria¬ß! can best be described as: [ITA_para_scripted_loc]"
ITA_law_on_mandatory_pensions: "Law on Mandatory Pensions"
ITA_law_on_mandatory_pensions_desc: ""
ITA_giolittian_shadow: "Building a Coalition"
ITA_giolittian_shadow_desc: "Though few in parliament outright hate us, the truth is we have no strong base of support. If Giolitti or Sonnino wanted the job back, they'd have it in an instant. We need to start making moves to secure a stronger base of support."
ITA_giolitti_era: "Continue the Giolitti Era"
ITA_giolitti_era_desc: ""
ITA_daneo_credaro_law: "Daneo-Credaro Law"
ITA_daneo_credaro_law_desc: "To effectively educate our population and increase literacy, our education needs to shift to a more centralized system, for better management of funding. Luigi Credaro and Edoardo Daneo have proposed a new law that will implement many reforms to the school system to help with this."
ITA_overtures_to_the_psi: "Overtures to the PSI"
ITA_overtures_to_the_psi_desc: "Governments in the past have attempted to pretend that the socialist party does not exist, a strategy that simply isn't realistic anymore. We should reach out to the PSI and see if we can get their support behind some of our center left agenda."
ITA_avoid_offensive_policies: "Firm Liberalism"
ITA_avoid_offensive_policies_desc: "The center left and center right make up the majority of Italy's parliament. Sure, we may not have the loyalty from them that Giolitti has, but who says we still can't make friends with them. Let's try and secure their firm backing."
ITA_embrace_nationalism: "Embrace Nationalism"
ITA_embrace_nationalism_desc: "Italian nationalism has been a burning fire since the days of Napoleon, and its recent revival in support as we look towards expanding our borders gives us great opportunity to co-opt nationalist rhetoric. Through mostly words alone, we can whip up a frenzy of support."
ITA_friend_of_the_south: "Friend of the South"
ITA_friend_of_the_south_desc: "The south has a deep resentment of Northern politicians like Giolitti. As our hold on the north becomes threatened by socialists, securing support from the south may be crucial towards mantaining a majority in parliament. Let's try and reconcile with them."
ITA_promote_creation_of_workers_councils: "Promote Creation of Workers Councils"
ITA_promote_creation_of_workers_councils_desc: "A way to push socialism on the local level is to help workers organize. Unions are great of course, but we can go a step further. By helping set up workers councils across northern Italy, we can help dramatically increase workers control over the economy."
ITA_the_welfare_state: "Constructing the Welfare State"
ITA_the_welfare_state_desc: "Poverty is the ulimate root of many issues. Crime, radicalisation, and even tragic cases of death from malnourishment or medical costs can all result from poverty. What issue could be of greater importance then tackling this plague on society? The government needs to play a large role in reducing poverty and building a saftey net for our citizens."
ITA_if_they_accept: "¬ßLEffects if they accept:¬ß!\n"
