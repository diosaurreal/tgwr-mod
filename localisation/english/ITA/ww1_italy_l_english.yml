ITA_cycling_divisions: "Bicycles in the Army"
ITA_cycling_divisions_desc: "Bicycles have begun being used in certain parts of the army on small scales and have proved effective increasing mobility. With these signs of success we should adapt bicycles on a more widespread scale across our army, for our divisions aswell as our supply deliveries."
