ITA_repair_cities_desc: "Many cities have suffered heavily from much destruction during the civil war, with many buildings flattened and infrastructure in disrepair as these cities were bastions of the revolutionary cause and were heavily fought over. These cities are vital to our economy and reparing them must be at the top of our priorities if we are to rebuild our economy."
