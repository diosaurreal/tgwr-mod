ITA_ascension_of_the_destra_desc:  "As the old system falters, many flock to the Destra (the Right), the traditional conservative forces. They promise to restore order, uphold traditional values, and pursue a strong foreign policy. This marks a shift away from liberal compromise towards a more authoritarian and nationalist stance, seeking to renew Italy through discipline and hierarchy."
ITA_ascension_of_the_estrema_destra: "Ascension of the Estrema Destra"
ITA_ascension_of_the_estrema_destra_desc: "The Estrema Destra (the Extreme Right) channels popular fury into a revolutionary movement that despises democracy and glorifies action. Their squads battle opponents in the streets, promising a national rebirth through force. They aim to purge the nation of weakness, socialism, and corruption, demanding total loyalty to a single, powerful leader."
ITA_ascension_of_the_estrema_sinistra: "Ascension of the Estrema Sinistra"
ITA_ascension_of_the_estrema_sinistra_desc: "The Estrema Sinistra (the Extreme Left) rallies the common people into a potent revolutionary force. Inspired by upheavals abroad, they argue the entire system of monarchy and capitalism must be swept away. Advocating for strikes and land seizures, they seek to build a new state where the workers and peasants hold all power."
