ITA_koan_repayment: "Repayment of Loans"
ITA_influx_capital: "Influx of Foreign Capital"
ITA_right_national_block: "¬ß1The National Block¬ß!\nThe National Block currently controls ¬ßC[?ITA_iw_national_block_party_seats]¬ß!/¬ßY508¬ß! seats in parliament.\n¬ßLThe national block is a diverse coalition of liberals,conservatives, nationalists, and fascists. They are united in their common opposition to the left wing parties which they see as the greatest political threat to Italy. The national block is heavily influenced by industrialists, and are thus generally opposed to most reforms, both socially and economic.¬ß!"
ITA_right_no_national_block: "¬ßNCombatants Party¬ß!\nThe Combants Party currently controls ¬ßC[?ITA_iw_combat_party_seats]¬ß!/¬ßY508¬ß! seats in parliament.\n¬ßLThe combatants party primarily attempts to appeal to the interests of post war veterns after the great war, although some wish to see its appeal expanded. They are heavily nationalistic, and generally right wing on most social and economic issues¬ß!\n\n¬ßqItalian Fascist Party¬ß!\nThe Italian Fascist Party currently controls ¬ßC[?ITA_iw_fascist_party_seats]¬ß!/¬ßY508¬ß! seats in parliament.\n¬ßLThe Italian fascist party is a third way movement lead by Benito Mussolini. Containing both left wing revolutionary rhetoric as well as right wing nationalistic rhetoric, the fascist party is quite ideologically undefined, meaning party positions are likely to shift as Mussolini adopts rhetoric that is electorally benefical.¬ß!"
ITA_left_max_no_com: "¬ßoItalian Socialist Party¬ß!\nThe Italian Socialist Party currently controls ¬ßC[?ITA_iw_psi_seats]¬ß!/¬ßY508¬ß! seats in parliament.\n¬ßLThe Italian Socialist Party or the PSI, has historically been the largest socialist party in Italy. They are currently dominated by maximalists, who rhetorically advocate for a revolution, although the PSI has been very hesitant to support actual revolutionary activity, with most of the PSI prefering to achieve socialism through legal means.¬ß!\n\n¬ßSReformist Socialist Party¬ß!\nThe Reformist Socialist Party currently controls ¬ßC[?ITA_iw_psi_r_seats]¬ß!/¬ßY508¬ß! seats in parliament.\n¬ßLBorn from a split with the Italian Socialist Party in 1912, the PSRI has rejected all revolutionary rhetoric of the PSI, and is firmly committed to achieving socialism through democratic means. The party is made up of moderate socialists who left the PSI after the maximalist takeover.¬ß!"
ITA_left_ref_no_com: "¬ßRRevolutionary Socialist Party¬ß!\nThe Revolutionary Socialist Party currently controls ¬ßC[?ITA_iw_psi_m_seats]¬ß!/¬ßY508¬ß! seats in parliament.\n¬ßLBorn from a split with the Italian Socialist Party in 1912, the PSRI has rejected all reformist rhetoric of the PSI, and has supported revolutionary movements across Italy. The party is made up of extreme socialists who left the PSI after the reformist triumph in the highly contested 1912 party election.\n\n¬ß!¬ßoItalian Socialist Party¬ß!\nThe Italian Socialist Party currently controls ¬ßC[?ITA_iw_psi_seats]¬ß!/¬ßY508¬ß! seats in parliament.\n¬ßLThe Italian Socialist Party or the PSI, has historically been the largest socialist party in Italy. They are currently dominated by reformists, who advocate for achieving socialism through purely legal and democratic means.¬ß!"
ITA_left_ref_yes_com: "¬ßQItalian Communist Party¬ß!\nThe Italian communist party currently controls ¬ßC[?ITA_iw_pcdi_seats]¬ß!/¬ßY508¬ß! seats in parliament\n¬ßLThe Italian communist party was founded after a split in the PSI caused by differing approaches to the Bienno Rosso. The communist party advocates for a workers revolution, state control of industries, and a dictatorship to represent the proletariat.¬ß!\n\n¬ßRRevolutionary Socialist Party¬ß!\nThe Revolutionary Socialist Party currently controls ¬ßC[?ITA_iw_psi_m_seats]¬ß!/¬ßY508¬ß! seats in parliament.\n¬ßLBorn from a split with the Italian Socialist Party in 1912, the PSRI has rejected all reformist rhetoric of the PSI, and has supported revolutionary movements across Italy. The party is made up of extreme socialists who left the PSI after the reformist triumph in the highly contested 1912 party election.\n\n¬ß!¬ßoItalian Socialist Party¬ß!\nThe Italian Socialist Party currently controls ¬ßC[?ITA_iw_psi_seats]¬ß!/¬ßY508¬ß! seats in parliament.\n¬ßLThe Italian Socialist Party or the PSI, has historically been the largest socialist party in Italy. They are currently dominated by reformists, who advocate for achieving socialism through purely legal and democratic means.¬ß!"
ITA_left_max_yes_com: "¬ßQItalian Communist Party¬ß!\nThe Italian communist party currently controls ¬ßC[?ITA_iw_pcdi_seats]¬ß!/¬ßY508¬ß! seats in parliament\n¬ßLThe Italian communist party was founded after a split in the PSI caused by differing approaches to the Bienno Rosso. The communist party advocates for a workers revolution, state control of industries, and a dictatorship to represent the proletariat.¬ß!\n\n¬ßoItalian Socialist Party¬ß!\nThe Italian Socialist Party currently controls ¬ßC[?ITA_iw_psi_seats]¬ß!/¬ßY508¬ß! seats in parliament.\n¬ßLThe Italian Socialist Party or the PSI, has historically been the largest socialist party in Italy. They are currently dominated by maximalists, who rhetorically advocate for a revolution, although the PSI has been very hesitant to support actual revolutionary activity, with most of the PSI prefering to achieve socialism through legal means.¬ß!\n\n¬ßSReformist Socialist Party¬ß!\nThe Reformist Socialist Party currently controls ¬ßC[?ITA_iw_psi_r_seats]¬ß!/¬ßY508¬ß! seats in parliament.\n¬ßLBorn from a split with the Italian Socialist Party in 1912, the PSRI has rejected all revolutionary rhetoric of the PSI, and is firmly committed to achieving socialism through democratic means. The party is made up of moderate socialists who left the PSI after the maximalist takeover.¬ß!"
