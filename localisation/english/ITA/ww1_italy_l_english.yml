ITA_naval_invasion_preperations: "Naval Invasion Preperations"
ITA_italian_nationalism: "Italian Nationalism"
ITA_italian_nationalism_desc: "Italy is home to a large intellectual group of Italian nationalists. These nationalist frame themselves as an alternative to the so called failures of liberal governance, which they blame for our humiliations in Ethiopia and Tunisia. While not entirely made up of authoritarians, most of their members do believe that democracy is one of the many things holding Italy back. "
ITA_social_unrest: "Social Unrest"
ITA_social_revolution_modifier: "Socialist Revolution"
ITA_social_revolution_modifier_desc: "The Unions have been empowered and the rightful heirs to the revolution have taken governance. Now that our state has been established and secured against the counter-revolutionary threat we will enact reform to transform Italia into a socialist paradise. The workers of the world will see our prosperity and soon see that they too, have nothing to lose but their chains."

ITA_new_aluminium_mines: "Build New Bauxite Mines"
ITA_social_unrest_desc: "Italy's social and political state are far from stable. Deeply ingrained issues like the southern question, poverty, political polarization, crime, and a lack of both a social saftey net and true political representation has lead to a country where mass social unrest is the normal. Extensive political, economic, and social reforms will be needed to help heal the country."
ITA_fruits_of_the_reforms: "Fruits of the Reforms"
ITA_fruits_of_the_reforms_desc: "Reforms from Giolliti and Sidney Sonnino's past governments have lead to benefits for Italy. New railways, increased land efficiency, the strengthening of the Lira, and expansion of rural industries have done much to strengthen Italy. As we continue to pass reforms, we can expect to reap even more rewards from our reforms."
ITA_italian_army: "[ITA_army_name_thing]"
ITA_italian_army_desc: "The army was seen as a critical tool of 'Initialization' from the moment of unification. Politicians on both left and right accepted that regional recruitment would have been more militarily efficient as well as more economical.\n\nThe implications of this organizational structure were numerous; first of all, from a logistical perspective, it was a costly and time-consuming system that greatly complicated and slowed down the process of mobilization. From the standpoint of unit cohesion, often considered being a vital factor in sustaining troop morale."
ITA_socialism_with_italian_characteristics: "Seek Class Collaboration"
ITA_revolting: "Revolting Province"

ITA_nation_first: "Nation First"
ITA_unlock_other_army_chiefs: "Currently Qualified for the Position"
ITA_unlock_seize_church: "¬ßGUnlocks¬ß! national focus: ¬ßYSeize Church Assets¬ß!"
ITA_peaceful_south: "¬ßGUnlocks¬ß! national focus: ¬ßYSecure Peace With Right Wing Catholics¬ß!"
ITA_sac_cadorna: "¬ßYLuigi Cadorna¬ß! will be fired and become ¬ßRunavailable¬ß!. ¬ßYArmando Diaz¬ß! will be hired as the new ¬ßYArmy Chief of Staff¬ß!, although various other men will also be ¬ßGunlocked¬ß! for the job."
ITA_encourage_self_defense_of_the_workers: "Arm the Workers"
ITA_encourage_self_defense_of_the_workers_desc: ""
ITA_workers_militia.tt: "Create Divisions using the ¬ßYGuardie Rosse¬ß! template."
ITA_guerrilla_tactics: "Guerrilla Tactics"
ITA_guerrilla_tactics_desc: "If we want to achieve victory against the large Italian army, we must switch to unconventional tactics. Using our popular support, we can encourage workers across Italy to begin a campaign of guerilla warfare against the Italian army, sabotaging logistics, communications and launching ambushes to slowly cripple their fighting capability."
ITA_guerrilla_tactics.tt: "(¬ßY[ITA.GetNameWithFlag]¬ß!) gets:"
ITA_recruit_northern_workers: "Recruit Northern Workers"
ITA_recruit_northern_workers_desc: "Across the north of Italy there are many workers supportive of our cause who would surely fight for us if armed. Launching a massive recruitment campaign throughout northern industrial cities to get workers to join our cause would greatly help in our liberation of the country from oppression."
ITA_recruit_northern_workers.tt: "We will gain a ¬ßYGuardie Rosse¬ß! division in the following cities if we control them: ¬ßYTornio¬ß!, ¬ßYMilano¬ß!, ¬ßYBergamo¬ß!, ¬ßYBrescia¬ß!, ¬ßYVerona¬ß!, ¬ßYPadova¬ß!, ¬ßYVenezia¬ß!, ¬ßYUdine¬ß!, ¬ßYParma¬ß!, ¬ßYBologna¬ß!, ¬ßYFirenze¬ß!\n\nCurrent ¬ßYEffects¬ß!:"
ITA_spread_revolution_down_south: "Spread the Flames of Revolution Down South"
ITA_spread_revolution_down_south_desc: "The peasants in the south of Italy have been exploited for decades by large landowners, charging very high rents and forcing them into poverty. With some support from us these peasants can get rid of their exploitative landowners and liberate the peasants while engulfing the entire south into the flames of revolution."

ITA_coordinate_the_unions: "Coordinate the Brigata Rivoluzionarias"
ITA_coordinate_the_unions_desc: ""
ITA_revolutionary_brigades.tt: "Create Divisions using the ¬ßYBrigata Rivoluzionaria¬ß! template."
ITA_victory_in_numbers: "Victory in Numbers"
ITA_victory_in_numbers_desc: ""
ITA_mass_conscription_of_workers: "Mass Mobilization of Workers"
ITA_mass_conscription_of_workers_desc: ""
ITA_mass_conscription_of_workers.tt: "We will gain a ¬ßYBrigata Rivoluzionaria¬ß! division in the following cities if we control them: ¬ßYTornio¬ß!, ¬ßYMilano¬ß!, ¬ßYVerona¬ß!, ¬ßYVenezia¬ß!, ¬ßYBologna¬ß!, ¬ßYFirenze¬ß!\n\nCurrent ¬ßYEffects¬ß!:"
ITA_support_the_roman_workers: "Support the Roman Workers"
ITA_support_the_roman_workers_desc: "Revolutionary fervor has struck the streets of Rome once more, with workers striking and revolting against the King in support of our revolutionary cause. Workers attempted to overthrow the King and seize Rome in the first days of the revolution, just like revolutionaries did against the Pope in 1849, however, this time were brutally suppressed by the Italian army and local security. But the revolution in Rome isn't defeated yet, and if we arm the workers we can liberate the city."

ITA_seek_internationalist_volunteers: "Invite International Volunteers"
ITA_seek_internationalist_volunteers_desc: "Across the world there are many internationalists who share the same idea of liberating the workers from oppression who are supportive of our revolutionary cause. Many are even willing to fight for us, and encouraging them to will greatly help us liberate the whole country."

ITA_article_8_is_now_a: "Article eight will now read:\n¬ßLAll representatives of parliament are sovereign within their elected mandate. No individual may dissolve them except through popular referendum or with new immediate elections.¬ß!"
ITA_socialist_propaganda: "Spread Socialist Propaganda in [FROM.GetName]"
ITA_s_prop: "Socialist Propaganda"
ITA_sabotadge_entente: "Solidarity With Western Workers"
ITA_socialist_sabotadge_entente: "Sabotage the Entente"
ITA_entente_civil_war: "¬ßYKarl Marx¬ß! always claimed the revolution would begin in industrialized western nations. Perhaps all that's needed to achieve the revolution in the west is a ¬ßRdefeat¬ß! in ¬ßYThe Great War¬ß!"
ITA_article_8_is_now_c: "Article eight will now read:\n¬ßLThe Prime Minister convokes the Chambers, and may prorogue them and dissolve them.¬ß!"
ITA_explusion_of_moderates: "Elections for the Chairman of the PSI"
ITA_ppd: "When this focus is elected:\nWe will recieve an ¬ßYevent chain¬ß! where a ¬ßCdictatorship¬ß! is established. ¬ßTParliament¬ß! may attempt to ¬ßRresist¬ß! us."
ITA_article_5_is_now_a: "Article five will now read:\n¬ßLThe armed forces are under the control of and beholdent to local workers councils and are to be organized under democratic command.¬ß!"
ITA_article_5_is_now_c: "Article five will now read:\n¬ßLThe Prime Minister is the Head of the State: he commands all armed forces by land and sea.¬ß!"
ITA_article_2_is_now_m: "Article two will now read:\n¬ßLThe Italian Republic is an athiest state. Public practice of religion is prohibited.¬ß!"
ITA_article_2_is_now_a: "Article two will now read:\n¬ßLThe Italian Republic is a secular state. Religion is separate from the state, and religious beliefs are free.¬ß!"
ITA_article_2_is_now_c: "Article two will now read:\n¬ßLThe Italian Republic is a secular state. Religion is separate from the state, and religious beliefs are free, provided they do not interfere with the rights of the working class or the authority of the socialist republic.¬ß!"
ITA_care_about_sucessor: "Giolitti's ¬ßCSucessor¬ß! will be decided by our actions as Prime Minister. Hovering over the focuses ¬ßYSocialism Through Reformism¬ß!, ¬ßYChristian Democracy¬ß!, ¬ßYA Chance For the Radicals¬ß!, ¬ßYThe Unappreciated Compromise¬ß!, ¬ßYThe Conservative Comeback¬ß!, ¬ßYThe Consensus of the Divided¬ß!, ¬ßYGiolitti's Great Gambit¬ß!, and ¬ßYLike Father, Like Son¬ß! to see what actions are needed to get your prefered sucessor."
ITA_article_1_is_now: "Article one will now read:\n¬ßLItaly is a democratic republic founded on the sovereignty of the working people. All power belongs to the proletariat, expressed through councils, assemblies, and democratic organs of workers and peasants¬ß!"
