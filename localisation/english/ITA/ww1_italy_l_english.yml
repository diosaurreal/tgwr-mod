ITA_askari_troops: "Recruit Askari Troops"
ITA_askari_troops_desc: "To keep our colonies under control is to adapt to our colonies. A new Camel Corps will be formed so that we can guard and protect our colonies better. "
ITA_italian_spahis: "Spahis Italialiani"
