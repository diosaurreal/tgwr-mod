ITA_centralize_the_police_desc: "The National Policing Reform Act will centralize the police, giving the prime minister control over police departments. We will be able to redirect funds across police departments, give direct orders to police, and fire those who are seen as ineffective."
ITA_legal_way.tt: "This decision is Mutually Exclusive with ¬ßYReforming the Police the Shady Way¬ß!\nWe will attempt to pass a law granting the government ¬ßGExtensive¬ß! control over police stations across the counmtry. Due to its radical nature, we will either need ¬ßQSoc¬ß!¬ßrial¬ß!¬ßtist¬ß! parties as well as the ¬ßlRepublicans¬ß! to be the majority in parliament, or for ¬ßYNationalist Agitation¬ß! be very high."
ITA_sticky: "¬ßYNationalist Agitation¬ß! is extremely high"
ITA_shady_way.tt: "This decision is Mutually Exclusive with ¬ßYReforming the Police the Legal Way¬ß!\nWe will attempt to use the ¬ßCFormazioni Di Defesa Proletaria¬ß! to gain the polices support through extortion. It requires a strong paramilitary, and will heavily ¬ßRStrain¬ß! relations with our non-socialist coalition members, but it's quite quick and easy."
ITA_outdated_fleet: "[ITA_outdated_fleet]"
ITA_outdated_fleet_desc: "The Italian Navy has been falling behind on neighbors' navies, like France's or Austria's."
ITA_outdated_fleet2: "Outdated Fleet"
ITA_regia_marina: "Regia Marina"
ITA_regia_marina2: "Rossa Marina"

ITA_broken_railroads_idea: "Broken Railroads"
ITA_fix_railroads: "Fix Broken Railroads"
ITA_neglected_economy: "Neglected Economy"
