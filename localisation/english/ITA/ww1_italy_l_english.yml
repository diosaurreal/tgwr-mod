ITA_government_stability: "Luigi Luzzatti's Government"
ITA_government_stability_desc: "Signore Luzzatti may be strong financier, but is he a strong prime minister? The answer is a resounding no. The opposition? Total lack of willingness to confront. Doing what needs to be done for the sake of the nation? Not if it makes him unpopular, no sir. It is only a matter of time before he falls, and so falls his half-realized ideals. Half-realized is generous, really. "
ITA_fading_mandate: "Fading Mandate"
ITA_reforming_the_country: "Reforming and Strengthening the Country"
ITA_reforming_the_country_desc: "United only half a century ago our nation is one of patchworks and bandaids for problems no-one seems to want to solve. The south remains in the exploited state that it has been under for a millenium and the integration of citizens under the Austrian umbrella has proven quite the challenge. These issues that permeate our relatively new state need to be addressed. In fact, they should have been addressed a decade ago, at the turn of the century, or even five decades ago, on the momentum of the Risorgimento. No matter, the time  remains ripe to transform the nation in order to meet a changing world. \n\nShatter the outdated standards of old! Bring a new industrial revolution to our southern kin! Create an Italy that shall bring its enemies to their knees and fulfill the promise of our nation!"
ITA_establish_the_school_patronage: "Establish the School Patronage"
ITA_increase_teacher_salary: "Increase Teachers Salaries"
ITA_bring_schools_under_state_control: "Bring Schools under State Control"
ITA_mandatory_education_for_soldiers: "Mandatory Education for Soldiers"
ITA_create_maternity_fund: "Creation of Maternity Fund"
ITA_nationalize_insurance: "Nationalize Insurance Companies"
ITA_fight_malaria_in_state: "Fight Malaria in [FROM.GetName]"
ITA_libyan_war: "Italo-Turkish War"
ITA_leftist_union: "Moderate the Extremist Parties"
ITA_leftist_union_desc: "The Radical party used to be in a similar position the PSI currently finds itself in. Many of their members refused to participate in governments and elections all together, until the early 1900's. As we brought them into government, the party natually moderated itself, with the radicals no longer holding the view that the monarchy should be abolished, for example. We must bring the PSI into a coalition, and repeat the same process that moderated the radical party."
ITA_the_reality_of_war: "The Realities of War"
ITA_the_reality_of_war_desc: "Many people in the country, including socialists, don't support the Italian involvement in Turkish Libya. As the war progresses for longer, socialist sentiment in the country will continue to rise and support for the war will start to decline as the population question our ability to achieve victory in this war against the Sick Man of Europe."
ITA_libyan_war_desc: "The inevitable war has finally broken done. Italia stands more united then ever with a patriotic fever running through the country. A patriotic fever so large, some are calling it 'dangerous'. With emotions at an all time high, we need to deliver results, both to humilate Turkey and to avoid being humilated to our own people. After all, socialists have claimed this war is completly useless and will only be a blood bath. We must prove them wrong. Unfortunately, the longer the war goes on the more correct they will appear."
ITA_war_preperations: "War Preperations"
ITA_war_preperations_desc: "Despite what our propaganda says, very few people in the higher ups of the Italian military and political office believe a war with Turkey will truely be a cakewalk. We're favored, yes, but ego would certainly be our downfall here. That's why Giolitti has ordered for war preperations to be made before we strike the Ottoman Empire. We want to ensure we are ready, but waiting too long will only anger nationalists further, who want an invasion as soon as possible."
ITA_prepare_for_naval_landings: "Prepare for Naval Landings"
ITA_publish_libyan_manual: "Publish the Manualetto per l'Ufficiale in Cirenaica"
ITA_invite_military_staff: "Invite Military Staff"
ITA_communication_lines: "Improve Communication Lines"
ITA_send_the_ultimatum: "Ultimatum for Tripolitania"
ITA_send_the_ultimatum_desc: "As the Ottomans are clearly discriminating against ethnic Italians in Libya, we shall send them an ultimatum to transfer the territory to us."
ITA_recognize_french_hegemony_morocco: "Quid Pro Quo with the French"
ITA_recognize_french_hegemony_morocco_desc: "The French promise us if we recognize their claims in morocco, the French promise back they would not intervene in a possible war between us and the Turkish."
ITA_bomb_ottoman_islands: "Bomb Ottoman Islands"
ITA_bombard_the_libyan_coast: "Shell the Libyan Coast"
ITA_survey_libyan_coastline: "Spy on Ottoman Ships"
ITA_capture_of_tripoli: "Hold Tripoli"

ITA_army_reforms: "The Italian Military"
ITA_navy_decisions: "The Italian Navy"
ITA_build_medusa_class_submarines: "Build Medusa Class Submarines"
ITA_build_medusa_class_submarines_desc: "Submarine engineer Cesare Laurenti has recently made a new submarine design, the Medusa Class. The new design is a significant step forward from the previous Foca design he made, the first Italian submarine design which is quite outdated now with it's petrol engine. We should get to work building these new submarines, as they are much better and are the next step for our navy."
ITA_build_indominito_class_destroyers: "Construct Indominito Class Destroyers" 
ITA_build_indominito_class_destroyers_desc: "The Indominito Class is a new destroyer design made by engineer Luigi Scaglia. These new ships are much larger and more advanced in many ways, with it's steam turbine instead of a steam engine and will be our first large destroyers when we finish building them."
ITA_build_the_dante_alighieri: "Build the Dante Alighieri"
ITA_build_the_dante_alighieri_desc: "Engineer Edoardo Masdea has made a dreadnought design, the Dante Alighieri class. When finished it will be the first Italian dreadnought, a great achievement for our navy, being a display of our naval power. We should finish up the construction of the ship, and get it with out on the seas with the rest of our Regia Marina."
ITA_build_conte_di_cavour_class: "Build Modern Dreadnoughts"
ITA_build_conte_di_cavour_class_desc: "As European powers are racing to build the most dreadnoughts, we need to catch up if our navy is to stand a chance. A new dreadnought design, the Conte di Cavour class has been made by engineer Edoardo Masdea. The new design has more armour and guns then the Dante Alighieri and is intended to be superior to the dreadnought designs of other European powers."
ITA_build_francesco_caracciolo_class: "Build the Francesco Caracciolo Class"
ITA_build_weather_monitoring_stations: "Build Weather Monitoring Stations"
ITA_build_weather_monitoring_stations_desc: "The weather at sea can completly change the outcome of any naval battle, destroying fleets, so it is critical we take caution. With the new usage of radio technology in our navy, we can build weather monitoring stations to report the weather to our navies and help them avoid disastrous storms."
ITA_train_new_naval_officers: "Train New Naval Officers"
ITA_train_new_naval_officers_desc: "Our navy is expanding a lot, and currently requires many more new naval officers to be properly staffed. With our new experience with modern ships, we should train modern officers who will know how to perfectly operate these recent innovations, such as submarines and dreadnoughts."
ITA_develop_new_hydrophones: "Develop New Hydrophones"
ITA_develop_new_hydrophones_desc: "Submarines are deadly vessels that pose a significant threat to our larger ships as they can be completely hidden and and strike a killing blow. Our current anti-submarine technology currently isn't great at detecting submarines and it's crucial we invest into the development of more precise hydrophone technology to accurately detect where the submarines are."
ITA_organized_naval_barrages: "Organized Naval Barrages"
ITA_organized_naval_barrages_desc: "With the development of our modern fire control systems, we can much more precisely target our large guns at enemy ships and strike devestating blows. We should use this to our advantage, using dreadnought battleships with their many guns in coordinated naval barrages that can devestate enemy fleets."
ITA_raid_the_austrian_navy: "Raid the Austrian Navy"
ITA_raid_beirut_port: "Raid Beirut Port"
