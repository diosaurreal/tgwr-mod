ITA_agricultural_credit_bank: "National Agricultural Credit Bank"
ITA_agricultural_credit_bank_desc: "Even though the PSI is less favored in the rural parts of Italy, we can't ignore them and their concerns. The farmers are the backbone of our country and we must ensure they are able to provide for themselves and sustain their farms. We can support their efforts by establishing a national agricultural credit bank, and boost the output of agricultural goods in rural Italy."
ITA_dismantle_potential_business_plots_desc: "It's obvious those pigs in the Confindustria are seeking a collapse of our government. It's suspected they may be up to all sorts of meddling aimed towards discrediting our government with some claiming they may even be planning coup d'√©tat. An investigation into these rumors may help us formulate a proper response."
