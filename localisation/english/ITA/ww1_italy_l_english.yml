ITA_judicial_independence: "Judicial Independence"
ITA_judicial_independence_desc: "Currently the judges of courts across Italy are appointed by the King himself and can be dismissed by him at any time. This is not a fair and independent system, and reforming it is crucial for having a proper judicial system."
