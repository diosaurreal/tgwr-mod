ITA_the_institutions: "The Institutions"
ITA_the_institutions_desc: "While we control the government, there are still many aspects of Italian politics we do have direct control over. That being the press, the police, and the judicial system. With these institutions all being very important, it's critical that we find a way to secure their support. Unfortunately, with our socialist ideology, it'll be hard work.\n\nOur relationship with the ¬ßCPress¬ß! is currently [ITA_press_loyalty_status]\n¬ßLThe press will write news about us that covers us poorly or favorably depending on our relations them. This will either boost or harm us in future elections. If relations are high enough, possible scandals that may come to light from our more shady actions may avoid press coverage¬ß!\nThe ¬ßCPolice¬ß! are currently [ITA_police_loyalty_status]\n¬ßLThe police can be used to target far right militias as well as the mafia. If they are disloyal, their inaction may end up strengthening right wing militias.¬ß!\nThe ¬ßCJudicial System¬ß! is currently [ITA_judge_loyalty_status]\n¬ßLWith an obstructionist judicial system, we will find it impossible to pass any reforms. A neutral judicial system will allow us to push anything we can get through parliament, while a more favorable judicial system may help us target nationalist parties through bannings."

