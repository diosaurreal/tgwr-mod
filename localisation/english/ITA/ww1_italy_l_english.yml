ww1_italy.452.d: "Many Italians, despite our best efforts to foster a sense of national unity and national objective, do not see how the war we are currently waging benefits them in the slighest. A war on the level of scale as the one we currently find ourselves involved in is no doubt going to change everything for the daily lifes of the Italian people if we do not see its conclusion fast enough, and when that happens, we can only pray their tolerance for suffering is high enough to avoid a revolution. It's safe to say that for all involved, its best we win this thing fast."
